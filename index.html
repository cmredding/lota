/* ===================== Toast & HUD ===================== */
let toastT=0;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');toastT=140;}
function updateHUD(){
  if(!G){$('hud').style.display='none';return;}
  $('hud').style.display=G.scene==='title'?'none':'block';
  $('hpfill').style.width=(100*G.hp/G.maxhp)+'%';
  $('hptxt').textContent=G.hp+'/'+G.maxhp;
  $('lvl').textContent=G.lvl;
  $('xp').textContent=Math.max(0,G.food|0); // repurposed: food
  $('gold').textContent=G.gold;
  $('coins').textContent=COIN_LABEL.bronze+(G.coins.bronze||0)+' '+COIN_LABEL.silver+(G.coins.silver||0)+' '+COIN_LABEL.gold+(G.coins.gold||0);
  const names={overworld:'Tarmalon',town:currentTownId||'Town',dungeon:(DUN&&DUN.theme==='pirate')?"Pirate's Lair":'Catacombs of Armak',fps:(DUN&&DUN.theme==='pirate')?"Pirate's Lair":'Dungeon',museum:'Galactic Museum'};
  $('loc').textContent=names[G.scene]||'Tarmalon';
}

/* ===================== Rewards / progression ===================== */
function grant(item,c,msg){addItem(item,c);if(msg)toast(msg);}
function setWeapon(w,d){G.weapon=w;G.wdmg=d;}
// quest-based leveling only (no XP); milestone helper grants a level once per key
function milestone(key,reason){ if(!G.flags['lvl_'+key]){ G.flags['lvl_'+key]=true; levelUp(reason); } }

/* ===================== MAIN QUEST (Caretaker) ===================== */
// Each stage: condition to advance + dialogue (authentic exhibit text where possible)
const MUSEUM_QUEST=[
  {who:"The Bracelet", text:[EXHIBITS[17]], after:()=>{G.flags.intro=true;}},
  {who:"Museum Caretaker", text:[EXHIBITS[18]]},
  {who:"Museum Caretaker", text:[EXHIBITS[19], EXHIBITS[30]], after:()=>{addItem('Museum Key',1);toast("Received Museum Key");G.flags.questStarted=true;}},
  {who:"Museum Caretaker", text:[EXHIBITS[21]], need:()=>hasItem('Crown of Mancella'), wait:"Find the Scepter & Crown of Mancella. The dungeon and castle hold them."},
  {who:"Museum Caretaker", text:[EXHIBITS[22]], need:()=>hasItem('Scepter of Mancella')&&hasItem('Crown of Mancella'),
     after:()=>{addItem('Magic Ice',1);useItem('Crown of Mancella');useItem('Scepter of Mancella');toast("Received Magic Ice");}},
  {who:"Museum Caretaker", text:[EXHIBITS[23],EXHIBITS[24],EXHIBITS[25]]},
  {who:"Museum Caretaker", text:[EXHIBITS[28]], after:()=>{G.flags.huntJewels=true;}},
  {who:"Museum Caretaker", text:[EXHIBITS[31]], need:()=>G.jewels>=4, wait:"Recover all 4 magic jewels from the dungeons of Tarmalon. ("+0+"/4)"},
  {who:"Museum Caretaker", text:[EXHIBITS[33]], after:()=>{G.flags.won=true;}},
];
function talkCaretaker(){
  const st=MUSEUM_QUEST[G.questStage];
  if(!st){ say(["You have already saved Tarmalon, hero. Walk the museum as you please."],"Museum Caretaker"); return; }
  if(st.need && !st.need()){
    let w=st.wait;
    if(G.questStage===7) w="Recover all 4 magic jewels from the dungeons of Tarmalon. ("+G.jewels+"/4)";
    say([w],"Museum Caretaker"); return;
  }
  say(st.text, st.who, ()=>{ if(st.after)st.after(); G.questStage++;
    if(G.flags.won){ winGame(); } });
}

/* ===================== Scenes: enter/leave ===================== */
function enterMuseum(){G.scene='museum';P.mi=0;sfx('open');
  if(!G.flags.intro){ talkCaretaker(); }
  setHint("Arrows: move between exhibits · <kbd>Space</kbd> view exhibit · <kbd>T</kbd> talk to Caretaker · <kbd>Esc</kbd> leave");
}
function viewExhibit(){
  const d=MUSEUM_DISPLAYS[P.mi]; const ct=d.ct||'bronze';
  if(!hasCoin(ct,d.coin)){
    const where = ct==='gold' ? "Gold coins are only found at the bottom of dungeons." : ct==='silver' ? "Silver coins drop from tougher foes and the Buyback Shop." : "Bronze coins come from traders and the Buyback Shop.";
    say(["This display needs "+d.coin+" "+ct+" coin"+(d.coin>1?'s':'')+" "+COIN_LABEL[ct]+". "+where],"Exhibit"); return;
  }
  spendCoin(ct,d.coin); sfx('coin');
  const first=!G.exhibitsSeen[d.ex]; G.exhibitsSeen[d.ex]=true;
  say([EXHIBITS[d.ex]], d.name, ()=>{ if(first&&d.reward)d.reward(); });
}
function enterTown(id,name){G.scene='town';currentTownId=name;currentTownId_id=id;TOWN=buildTown();
  P.x=TOWN.w>>1;P.y=TOWN.h-2;sfx('open');
  setHint("Arrows: walk · enter a 🚪 shop or talk to ? NPCs · <kbd>Esc</kbd> leave town");
  // entering a different town clears guard memory of the others
  for(const t in G.guards){ if(t!==id) delete G.guards[t]; }
  // mail delivery
  if(G.mail && G.mail.toId===id){ const r=G.mail.reward; G.gold+=r; const from=G.mail.fromName; G.mail=null; sfx('coin');
    setTimeout(()=>say(["You deliver the letter from "+from+". The recipient pays you "+r+" gold. Thanks, courier!"],"Mail Delivered"),60); return; }
  // guards remember a robbery here
  if(G.guards[id]){ setTimeout(()=>say(["The guards of "+name+" recognize you from the bank robbery!"],"Wanted!",()=>{ startBattle(Object.assign({},MONSTERS[8],{n:"Town Guard",hp:36})); }),60); }
}
let currentTownId_id=null;
function faceOpen(){ // pick an initial facing that has open floor
  const dv=[[0,-1],[1,0],[0,1],[-1,0]];
  for(let d=0;d<4;d++){const x=P.x+dv[d][0],y=P.y+dv[d][1]; if(DUN.m[y]&&DUN.m[y][x]===30){G.dir=d;return;}} G.dir=1;
}
function enterDungeon(){G.scene='fps';DUN=buildDungeon();P.x=DUN.sx;P.y=DUN.sy;faceOpen();spawnDunRoamers();sfx('open');
  say(["You descend into the twisting catacombs of Armak. Torchlight gutters against the close stone walls. Find the stairs ↑ to climb out — and grab any treasure you can."],"Catacombs of Armak");
  setHint("D-pad: ▲ forward · ◀ ▶ turn · ▼ back · explore in first person · <kbd>Esc</kbd> retreat");}
function enterPirateLair(){G.scene='fps';DUN=buildPirateLair();P.x=DUN.sx;P.y=DUN.sy;faceOpen();spawnDunRoamers();sfx('open');
  say([EXHIBITS[4]||"The pirate's lair has many levels. At the very bottom lies a priceless SAPPHIRE!",
       "You arrive on the largest of the Three Sisters. Sea-water seeps through the cavern walls. Somewhere in the deepest chamber lies the SAPPHIRE."],"Pirate's Lair");
  setHint("D-pad: ▲ forward · ◀ ▶ turn · ▼ back · find the Sapphire · <kbd>Esc</kbd> retreat");}
// First-person movement: step in the faced direction (reuses dungeon tile handlers)
function fpsForward(sign){
  const dv=[[0,-1],[1,0],[0,1],[-1,0]][G.dir];
  moveInterior(dv[0]*sign, dv[1]*sign);
}
function backToOverworld(){G.scene='overworld';dunRoamers=[];sfx('open');
  if(owRoamers.length<4) spawnRoamers();
  setHint(OW_HINT);}
const OW_HINT="Arrows: travel · avoid or fight roaming monsters · <kbd>I</kbd> inventory · <kbd>M</kbd> quest · <kbd>Esc</kbd> save/menu";
function setHint(h){$('chint').innerHTML=h;}

/* ===================== Movement ===================== */
function moveOW(dx,dy){
  const nx=G.px+dx,ny=G.py+dy;
  if(nx<0||ny<0||nx>=OWMAP.w||ny>=OWMAP.h)return;
  const t=OWMAP.m[ny][nx];
  if(!walkableOW(t)){ if(t===4)toast("The mountains are impassable."); else toast("The water is too rough to cross."); return;}
  G.px=nx;G.py=ny;G.steps++;sfx('step');stepFood();
  const L=landmarkAt(nx,ny);
  if(L){ enterLandmark(L); return; }
  if(checkRoamerCollision(owRoamers)) return;      // walked into a monster
  stepRoamers(owRoamers, owWalk);                   // monsters move
  if(checkRoamerCollision(owRoamers)) return;       // a monster walked into us
  if(owRoamers.length<6 && chance(0.04)) spawnRoamers(); // replenish
  if((t===2||t===3||t===5)&&chance(0.02)) meetTrader();   // friendly encounter
  else if((t===2||t===3||t===5)&&chance(0.015)) startBattle(); // rare ambush
}
function meetTrader(){
  const who=pick(['a wandering farmer','a roadside bandit','a traveling merchant']);
  const opts=[
    {label:"Buy Rations (3)",sub:"15g",act:()=>{ if(buy(15)){addItem('Rations',3);toast("+3 Rations");} }},
    {label:"Buy a bronze coin",sub:"18g",act:()=>{ if(buy(18)){addCoin('bronze',1);toast("+1 bronze coin");} }},
    {label:"Buy a Healing Herb",sub:"14g",act:()=>{ if(buy(14)){addItem('Healing Herb');toast("+1 Healing Herb");} }},
    {label:"Move along",sub:"",act:()=>{}},
  ];
  openMenu("You meet "+who+".", opts, (it,i)=>{ opts[i].act&&opts[i].act(); });
}
function enterLandmark(L){
  if(L.tile===7) enterMuseum();
  else if(L.tile===8){ // town
    enterTown(L.id,L.name);
  } else if(L.tile===9){ if(L.id==='piratecave') enterPirateLair(); else enterDungeon(); }
  else if(L.tile===10){ enterCastle(L); }
}
function enterCastle(L){
  // Castle holds the Crown of Mancella (guarded). Simple set-piece.
  if(hasItem('Crown of Mancella')||G.flags.castleDone){ say(["Kelfor Castle stands quiet. You have already claimed its treasure."],"Kelfor Castle"); return; }
  say([
    "You cross into Baron Kelfor's castle. Decoded from the original CASTLE map: ninety tiles wide, a maze of halls, gardens and hidden passages.",
    "Castle guards bar the inner vault. They demand the four keys... but your Museum Key fits a hidden servant's door behind the gardens.",
  ],"Kelfor Castle",()=>{
    if(!hasItem('Museum Key')){ say(["The doors are locked. The Caretaker spoke of a key — return when you have it."],"Kelfor Castle"); return; }
    // guard fight
    startBattle(Object.assign({},MONSTERS[3],{n:"Castle Guard",hp:28}),()=>{
      addItem('Crown of Mancella',1);G.flags.castleDone=true;sfx('win');
      say(["Behind the gardens, in a spiral room, rests the jewelled CROWN OF MANCELLA. You take it for the Museum."],"Kelfor Castle");
    });
  });
}
function moveInterior(dx,dy){
  const map=G.scene==='town'?TOWN:DUN;
  const nx=P.x+dx,ny=P.y+dy;
  if(nx<0||ny<0||nx>=map.w||ny>=map.h)return;
  const t=map.m[ny][nx];
  if(G.scene==='town'){
    if(t===21){return;} // wall
    if(t===22){ backToOverworld(); return; } // gate
    if(t===23){ const d=map.doors.find(d=>d.x===nx&&d.y===ny); P.x=nx;P.y=ny; if(d)openShop(d.shop); return; }
    P.x=nx;P.y=ny;sfx('step');
    const npc=map.npcs.find(n=>n.x===nx&&n.y===ny); if(npc){giveHint();}
  } else { // dungeon
    if(t===31)return; // wall
    if(t===36){ toast("Sea-water blocks the way."); return; } // water
    P.x=nx;P.y=ny;G.steps++;sfx('step');stepFood();
    if(t===33){ // stairs up
      const pir=DUN.theme==='pirate';
      say([pir?"You climb back to the surface of the Three Sisters and sail for the mainland.":"You climb the stairs and emerge into daylight, tougher for the ordeal."],pir?"Pirate's Lair":"Catacombs of Armak",()=>{milestone(pir?'pirate':'armak','dungeon survived');backToOverworld();});
      return;
    }
    if(t===34){ openChest(nx,ny); return; }
    if(t===35){ takeSapphire(nx,ny); return; }
    if(checkRoamerCollision(dunRoamers)) return;
    stepRoamers(dunRoamers, dunWalk);
    if(checkRoamerCollision(dunRoamers)) return;
    if(chance(0.04)) startBattle(); // rare ambush in the dark
  }
}
function openChest(x,y){
  DUN.m[y][x]=30; sfx('coin');
  // chest contents: gold, or a quest item (Scepter / a jewel)
  if(!hasItem('Scepter of Mancella')&&!G.flags.gotScepter){ G.flags.gotScepter=true;addItem('Scepter of Mancella',1);
    say(["Inside the chest: the jewelled SCEPTER OF MANCELLA! One of the Museum's lost treasures."],"Treasure!"); return; }
  if(G.flags.huntJewels && G.jewels<4){ G.jewels++; const names=["Sapphire","Emerald","Ruby","Diamond"];
    say(["You find one of the four magic jewels — the "+names[G.jewels-1]+"! ("+G.jewels+"/4 jewels)"],"Treasure!"); return; }
  const g=20+rnd(40)+G.lvl*5; G.gold+=g;
  const herb=chance(.5); if(herb)addItem('Healing Herb',1);
  const gc=chance(.4); if(gc)addCoin('gold',1); // gold museum coins from dungeon depths
  say(["The chest holds "+g+" gold"+(herb?", a Healing Herb":"")+(gc?", and a GOLD museum coin "+COIN_LABEL.gold:"")+"."],"Treasure!");
}

function takeSapphire(x,y){
  // guarded by a fierce bred beast, per the exhibit lore
  startBattle(Object.assign({},MONSTERS[10],{n:"Pirate's Guard-Beast",hp:70,gold:90}),()=>{
    DUN.m[y][x]=30; sfx('win'); addCoin('gold',2);
    if(!hasItem('Sapphire')){ addItem('Sapphire',1); if(G.flags.huntJewels&&G.jewels<4)G.jewels++; }
    say(["At the very bottom of the lair, behind the slain guardian, glitters the priceless SAPPHIRE — one of the four magic jewels! ("+G.jewels+"/4)  You also collect 2 gold museum coins."],"Treasure!");
  });
}

/* ===================== Town shops ===================== */
function buy(cost){ if(G.gold>=cost){G.gold-=cost;sfx('coin');return true;} toast("Not enough gold"); return false; }
function openShop(shop){
  // guards remember a robbery until you leave town
  if(shop.k==='weapon'){
    openMenu("Weaponsmith — equipped: "+G.weapon+" (dmg "+G.wdmg+")",
      WEAPONS.filter(w=>w.cost>0).map(w=>({label:(G.weapon===w.n?'✔ ':'')+w.n,sub:'dmg '+w.dmg+' · '+w.cost+'g'})).concat([{label:"Some foes resist all but the right weapon",sub:''}]),
      (it,i)=>{ const list=WEAPONS.filter(w=>w.cost>0); const w=list[i]; if(!w)return;
        if(G.weapon===w.n){toast("Already equipped");return;}
        if(buy(w.cost)){ setWeapon(w.n,w.dmg); addItem(w.n,1); toast(w.n+" equipped!"); } });
  } else if(shop.k==='armor'){
    openMenu("Armorer — worn: "+G.armor+" (def "+G.adef+")",
      ARMORS.filter(a=>a.cost>0).map(a=>({label:(G.armor===a.n?'✔ ':'')+a.n,sub:'def '+a.def+' · '+a.cost+'g'})),
      (it,i)=>{ const list=ARMORS.filter(a=>a.cost>0); const a=list[i]; if(!a)return;
        if(G.armor===a.n){toast("Already worn");return;}
        if(buy(a.cost)){ G.armor=a.n; G.adef=a.def; addItem(a.n,1); toast(a.n+" equipped!"); } });
  } else if(shop.k==='magic'){
    openMenu("Magic Shop — spells are cast until charges run out",
      SPELLS.map(s=>({label:"Buy "+s.n+"  ✦"+(G.spells[s.n]||0),sub:s.d+' · '+s.cost+'g'})),
      (it,i)=>{ const s=SPELLS[i]; if(s&&buy(s.cost)){ G.spells[s.n]=(G.spells[s.n]||0)+1; toast("+1 "+s.n+" charge"); } });
  } else if(shop.k==='healer'){
    const cost=Math.max(5,(G.maxhp-G.hp)*2);
    openMenu("Healer", [{label:"Heal fully",sub:cost+"g"},{label:"Buy Healing Herb",sub:"15g"},{label:"Buy Climbing Gear",sub:"40g"},{label:"Buy Rations (food)",sub:"12g"}],
      (it,i)=>{ if(i===0){if(G.hp>=G.maxhp){toast("Already full");return;} if(buy(cost)){G.hp=G.maxhp;sfx('heal');toast("Fully healed");}}
        else if(i===1){if(buy(15)){addItem('Healing Herb');toast("+1 Healing Herb");}}
        else if(i===2){if(buy(40)){addItem('Climbing Gear');toast("Climbing gear acquired");}}
        else if(i===3){if(buy(12)){addItem('Rations',3);toast("+3 Rations");}} });
  } else if(shop.k==='bank'){
    G.flags.bank=G.flags.bank||0;
    openMenu("Lender & Bank — vault: "+G.flags.bank+"g",
      [{label:"Deposit 50 gold",sub:"safe on death"},{label:"Withdraw 50 gold"},{label:"Take a loan (+100g)"},{label:"⚠ Rob the bank",sub:"risky!"}],
      (it,i)=>{ if(i===0){if(G.gold>=50){G.gold-=50;G.flags.bank+=50;toast("Deposited");}else toast("Not enough gold");}
        else if(i===1){if(G.flags.bank>=50){G.flags.bank-=50;G.gold+=50;toast("Withdrew 50g");}else toast("Vault too low");}
        else if(i===2){G.gold+=100;toast("Loan: +100 gold");}
        else if(i===3){ robBank(); } });
  } else if(shop.k==='buyback'){
    openMenu("Buyback Shop & Merchant",
      [{label:"Buy bronze coin "+COIN_LABEL.bronze,sub:"20g"},{label:"Buy 5 bronze coins",sub:"90g"},
       {label:"Buy silver coin "+COIN_LABEL.silver,sub:"75g"},{label:"Sell a Healing Herb",sub:"+8g"},{label:"Sell Meat",sub:"+5g"}],
      (it,i)=>{ if(i===0){if(buy(20)){addCoin('bronze',1);toast("+1 bronze coin");}}
        else if(i===1){if(buy(90)){addCoin('bronze',5);toast("+5 bronze coins");}}
        else if(i===2){if(buy(75)){addCoin('silver',1);toast("+1 silver coin");}}
        else if(i===3){if(useItem('Healing Herb')){G.gold+=8;sfx('coin');toast("+8 gold");}else toast("No herbs");}
        else if(i===4){if(useItem('Meat')){G.gold+=5;sfx('coin');toast("+5 gold");}else toast("No meat");} });
  } else if(shop.k==='arcade'){
    openMenu("Arcade — win gold & permanently raise stats",
      [{label:"Stadium Defender",sub:"block fireballs · +Endurance"},{label:"Blackjack",sub:"gamble for gold"},{label:"Flip-Flop",sub:"skill bet · +Dexterity"}],
      (it,i)=>{ if(i===0)startStadium(); else if(i===1)startBlackjack(); else if(i===2)startFlipFlop(); });
  } else if(shop.k==='inn'){
    openMenu("Inn",[{label:"Rest the night",sub:"10g — full heal & feed"}],(it,i)=>{
      if(buy(10)){G.hp=G.maxhp;G.food=G.maxfood;sfx('heal');say(["You rest soundly and wake refreshed and fed."],"Inn");}});
  }
}
function robBank(){
  const amt=80+rnd(120); G.gold+=amt; G.flags.bank=Math.max(0,(G.flags.bank||0));
  if(currentTownId) G.guards[currentTownId]=true;
  sfx('bad'); say(["You grab "+amt+" gold from the vault! The town guards of "+currentTownId+" will hunt you until you leave and return."],"Robbery!");
}
let hintIdx=0;
function giveHint(){
  // sometimes offer a mail-delivery quest
  if(!G.mail && chance(0.5)){
    const towns=LANDMARKS.filter(l=>l.tile===8 && l.id!==currentTownId_id);
    if(towns.length){ const t=pick(towns);
      G.mail={toId:t.id, toName:t.name, fromName:currentTownId, reward:100+rnd(60)};
      say(["\"Courier! Carry this letter to "+t.name+" and you'll be paid about "+G.mail.reward+" gold on arrival.\""],"Townsperson"); return; }
  }
  const h=HINTS[hintIdx%HINTS.length];hintIdx++; G.hintsSeen++;
  say([h],"Townsperson");
}

/* ===================== Mini-games ===================== */
// --- Blackjack (menu driven) ---
let BJ=null;
function bjDraw(){ return 1+rnd(13); }
function bjVal(cs){ let v=0,a=0; cs.forEach(c=>{ if(c>10)v+=10; else if(c===1){v+=11;a++;} else v+=c; }); while(v>21&&a){v-=10;a--;} return v; }
function startBlackjack(){
  openMenu("Blackjack — place your bet",[{label:"Bet 10g"},{label:"Bet 25g"},{label:"Bet 50g"},{label:"Leave"}],(it,i)=>{
    if(i===3)return; const bet=[10,25,50][i]; if(G.gold<bet){toast("Not enough gold");return;}
    G.gold-=bet; BJ={bet,p:[bjDraw(),bjDraw()],d:[bjDraw(),bjDraw()]}; bjTurn(); });
}
function bjTurn(){ const pv=bjVal(BJ.p); if(pv>=21){bjEnd();return;}
  openMenu("Blackjack — your hand "+BJ.p.join(',')+" = "+pv+"  (dealer shows "+BJ.d[0]+")",
    [{label:"Hit"},{label:"Stand"}],(it,i)=>{ if(i===0){BJ.p.push(bjDraw());bjTurn();} else bjEnd(); }); }
function bjEnd(){ let pv=bjVal(BJ.p),dv=bjVal(BJ.d); while(dv<17){BJ.d.push(bjDraw());dv=bjVal(BJ.d);}
  let win=0,msg;
  if(pv>21)msg="Bust! You lose "+BJ.bet+"g.";
  else if(dv>21||pv>dv){win=BJ.bet*2;msg="You win! +"+win+"g.";}
  else if(pv===dv){win=BJ.bet;msg="Push — bet returned.";}
  else msg="Dealer wins. You lose "+BJ.bet+"g.";
  G.gold+=win; sfx(win>BJ.bet?'coin':'bad');
  const p=BJ.p.join(','),d=BJ.d.join(','); BJ=null;
  say(["Your "+p+" ("+pv+") vs dealer "+d+" ("+dv+"). "+msg],"Blackjack"); }
// --- Flip-Flop (double-or-nothing skill streak) ---
let FF=null;
function startFlipFlop(){
  openMenu("Flip-Flop — bet, call the flips, cash out anytime",[{label:"Bet 10g"},{label:"Bet 30g"},{label:"Leave"}],(it,i)=>{
    if(i===2)return; const bet=[10,30][i]; if(G.gold<bet){toast("Not enough gold");return;}
    G.gold-=bet; FF={pot:bet,streak:0}; ffRound(); });
}
function ffRound(){
  openMenu("Flip-Flop — pot "+FF.pot+"g · streak "+FF.streak,
    [{label:"Call FLIP"},{label:"Call FLOP"},{label:"Cash out (+"+FF.pot+"g)"}],(it,i)=>{
      if(i===2){ const amt=FF.pot,s=FF.streak; G.gold+=amt; sfx('coin'); FF=null;
        if(s>=4){G.dex+=1;toast("Dexterity +1!");} say(["You pocket "+amt+" gold."],"Flip-Flop"); return; }
      if(chance(0.5+G.dex*0.01)){ FF.pot*=2; FF.streak++; sfx('coin'); ffRound(); }
      else { sfx('bad'); FF=null; say(["Wrong call! The pot is lost."],"Flip-Flop"); } });
}
// --- Stadium Defender (real-time: turn to face & block incoming fireballs) ---
let SD=null;
function startStadium(){
  G.scene_prevSD=G.scene; G.scene='stadium';
  SD={lives:3, score:0, target:12, facing:0, balls:[], spawn:0, t:0}; // facing: 0=up,1=right,2=down,3=left
  closeMenu(); sfx('open');
  setHint("Turn to FACE each fireball to block it — use the D-pad / arrows. Reach "+SD.target+" blocks. B to quit.");
}
function sdUpdate(dt){
  if(!SD) return;
  SD.t+=dt; SD.spawn-=dt;
  const speed=0.00022+SD.score*0.000018;
  if(SD.spawn<=0){ SD.balls.push({dir:rnd(4),dist:1}); SD.spawn=Math.max(420,900-SD.score*35); }
  for(let i=SD.balls.length-1;i>=0;i--){ const b=SD.balls[i]; b.dist-=speed*dt;
    if(b.dist<=0){ SD.balls.splice(i,1);
      if(SD.facing===b.dir){ SD.score++; sfx('hit'); if(SD.score>=SD.target){ sdEnd(true); return; } }
      else { SD.lives--; sfx('hurt'); if(SD.lives<=0){ sdEnd(false); return; } } } }
}
function sdEnd(won){
  const scene=G.scene_prevSD||'town';
  if(won){ G.end+=2; G.maxhp+=6; G.hp=G.maxhp; G.gold+=60; sfx('lvl'); }
  SD=null; G.scene=scene;
  say([won?"You blocked them all! Endurance +2, max HP +6, +60 gold.":"A fireball got through. Better luck next time."],"Stadium Defender");
}
function sdRender(){
  const g=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,Math.max(W,H)/1.4);
  g.addColorStop(0,'#2a2030');g.addColorStop(1,'#0a0712'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const cx=W/2, cy=H/2, R=Math.min(W,H)*0.42;
  // arena ring
  ctx.strokeStyle='#caa24a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();ctx.lineWidth=1;
  // player facing
  const ang=[-Math.PI/2,0,Math.PI/2,Math.PI][SD.facing];
  ctx.fillStyle='#5cc6ff';ctx.beginPath();ctx.arc(cx,cy,14,0,7);ctx.fill();
  ctx.fillStyle='#f4c860';ctx.beginPath();ctx.moveTo(cx+Math.cos(ang)*20,cy+Math.sin(ang)*20);
  ctx.lineTo(cx+Math.cos(ang+2.4)*12,cy+Math.sin(ang+2.4)*12);ctx.lineTo(cx+Math.cos(ang-2.4)*12,cy+Math.sin(ang-2.4)*12);ctx.fill();
  // fireballs
  const dv=[[0,-1],[1,0],[0,1],[-1,0]];
  for(const b of SD.balls){ const d=dv[b.dir]; const x=cx+d[0]*R*b.dist, y=cy+d[1]*R*b.dist;
    ctx.fillStyle='#ff7a3a';ctx.beginPath();ctx.arc(x,y,9,0,7);ctx.fill();
    ctx.fillStyle='#ffe08a';ctx.beginPath();ctx.arc(x,y,4,0,7);ctx.fill(); }
  ctx.fillStyle='#e8edff';ctx.textAlign='center';ctx.font='bold 16px sans-serif';
  ctx.fillText("Blocks "+SD.score+"/"+SD.target+"    Lives "+'❤'.repeat(Math.max(0,SD.lives)), W/2, 24);
}

/* ===================== BATTLE ===================== */
let B=null;
function startBattle(forced,onWin){
  const m=forced||monsterFor();
  B={m, mhp:m.hp, onWin:onWin||null, log:"A "+m.n+" attacks!", turn:'player', def:false, stun:false, strBuff:0};
  sfx('bad'); setTrack('battle');
  G.scene_prev=G.scene; // remember
  openBattleMenu();
}
function openBattleMenu(){
  if(!B)return;
  const weak=B.m.weak&&G.weapon===B.m.weak;
  const charges=Object.values(G.spells||{}).reduce((a,b)=>a+b,0);
  openMenu("⚔ "+B.m.n+"   (HP "+Math.max(0,B.mhp)+")",
    [{label:"Attack with "+G.weapon, sub:weak?"effective!":""},
     {label:"Cast Spell", sub:charges?charges+" charges":"none"},
     {label:"Use Healing Herb", sub:(G.inv['Healing Herb']||0)+" left"},
     {label:"Defend", sub:"reduce damage"},
     {label:"Flee", sub:""}],
    (it,i)=>battleAction(i));
}
function enemyTurn(){
  if(!B) return;
  if(B.mhp<=0){ winBattle(); return; }
  if(B.stun){ B.stun=false; B.log+=" The "+B.m.n+" is befuddled and cannot act."; say([B.log],"Battle",()=>openBattleMenu()); return; }
  let md=B.m.atk+rnd(4)-(B.def?Math.floor(B.m.atk*0.6):0)-(G.adef||0);
  md=Math.max(1,md); G.hp-=md; sfx('hurt');
  B.log+=" The "+B.m.n+" hits you for "+md+".";
  if(G.hp<=0){ G.hp=0; gameOver(); return; }
  say([B.log],"Battle",()=>openBattleMenu());
}
function battleAction(i){
  if(!B)return; B.def=false;
  if(i===0){ let dmg=G.str+G.wdmg+rnd(5)+(B.strBuff||0);
    if(B.m.weak&&G.weapon===B.m.weak) dmg=Math.floor(dmg*1.8);
    B.mhp-=dmg; sfx('hit'); B.log="You strike the "+B.m.n+" for "+dmg+(B.m.weak===G.weapon?" (super effective!)":"")+"."; enemyTurn(); }
  else if(i===1){ castMenu(); }
  else if(i===2){ if(useItem('Healing Herb')){const h=15+G.intel;G.hp=clamp(G.hp+h,0,G.maxhp);sfx('heal');B.log="You eat a Healing Herb (+"+h+" HP).";}else B.log="No Healing Herbs left!"; enemyTurn(); }
  else if(i===3){ B.def=true;B.log="You raise your guard."; enemyTurn(); }
  else if(i===4){ if(chance(0.55)){ toast("You flee!"); B=null; afterBattle(false);} else { B.log="You failed to flee!"; enemyTurn(); } }
}
function castMenu(){
  const avail=SPELLS.filter(s=>(G.spells[s.n]||0)>0);
  if(!avail.length){ toast("No spell charges — buy some at a Magic Shop"); openBattleMenu(); return; }
  openMenu("Cast which spell?",
    avail.map(s=>({label:s.n+"  ✦"+G.spells[s.n],sub:s.d})).concat([{label:"← Back",sub:''}]),
    (it,idx)=>{ if(idx>=avail.length){ openBattleMenu(); return; } doSpell(avail[idx].n); });
}
function doSpell(name){
  if(!B) return;
  G.spells[name]--; if(G.spells[name]<=0) delete G.spells[name];
  sfx('hit');
  if(name==='Blast'){ const d=12+G.intel+rnd(8); B.mhp-=d; B.log="Blast hits for "+d+"!"; enemyTurn(); }
  else if(name==='Fireblast'){ const d=22+G.intel*2+rnd(10); B.mhp-=d; B.log="Fireblast sears for "+d+"!"; enemyTurn(); }
  else if(name==='Befuddle'){ B.stun=true; B.log="You befuddle the "+B.m.n+"!"; enemyTurn(); }
  else if(name==='Kill'){ if(B.m.hp<=40||chance(0.4)){ B.mhp=0; B.log="The Kill spell slays the "+B.m.n+"!"; winBattle(); } else { B.log="The "+B.m.n+" resists the Kill spell!"; enemyTurn(); } }
  else if(name==='Strength'){ B.strBuff=(B.strBuff||0)+8; B.log="Psycho-strength surges (+8 attack)!"; enemyTurn(); }
  else if(name==='Museum'){ toast("You warp to the Museum!"); B=null; setTrack('theme'); enterMuseum(); }
}
function winBattle(){
  G.gold+=B.m.gold; sfx('win');
  let extra="";
  if(B.m.food){ addItem('Meat',1); extra+=", +1 meat"; }
  if(B.m.coin && chance(0.5)){ addCoin(B.m.coin,1); extra+=", +1 "+B.m.coin+" coin"; }
  else if(chance(0.22)){ addCoin('bronze',1); extra+=", +1 bronze coin"; }
  const cb=B.onWin; const name=B.m.n; const gold=B.m.gold; B=null;
  say(["You defeated the "+name+"!  +"+gold+" gold"+extra+"."],"Victory",()=>{ if(cb)cb(); afterBattle(true); });
}
function afterBattle(won){ setTrack(G.scene==='dungeon'?'theme':'theme'); }
function gameOver(){
  B=null; setTrack('theme');
  say(["You have fallen. But the Museum's bracelet pulses with ancient power...",
       "The Caretaker's magic draws your spirit back to the Galactic Museum. You lose half your gold, but your quest endures."],"Defeated",()=>{
    G.gold=Math.floor(G.gold/2); G.hp=G.maxhp; G.scene='museum'; P.mi=0; setHint("");
  });
}
function winGame(){
  G.flags.won=true; sfx('win');
  showEnding();
}

/* ===================== Input ===================== */
const keys={};
addEventListener('keydown',e=>{
  if(G&&G.scene!=='title'){ if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); }
  if(dlgOpen){ if(e.key===' '||e.key==='Enter'){advanceDlg();} return; }
  if(menuOpen){
    if(e.key==='ArrowUp'){menuSel=(menuSel-1+menuItems.length)%menuItems.length;renderMenu();}
    else if(e.key==='ArrowDown'){menuSel=(menuSel+1)%menuItems.length;renderMenu();}
    else if(e.key==='Enter'||e.key===' '){chooseMenu();}
    else if(e.key==='Escape'){ if(B){/* can't escape battle menu via esc */}else closeMenu(); }
    return;
  }
  if(!G||G.scene==='title') return;
  const k=e.key;
  if(G.scene==='overworld'){
    if(k==='ArrowUp')moveOW(0,-1);else if(k==='ArrowDown')moveOW(0,1);
    else if(k==='ArrowLeft')moveOW(-1,0);else if(k==='ArrowRight')moveOW(1,0);
    else if(k==='i'||k==='I')showInventory();
    else if(k==='m'||k==='M')showQuestLog();
    else if(k==='Escape')systemMenu();
  } else if(G.scene==='town'){
    if(k==='ArrowUp')moveInterior(0,-1);else if(k==='ArrowDown')moveInterior(0,1);
    else if(k==='ArrowLeft')moveInterior(-1,0);else if(k==='ArrowRight')moveInterior(1,0);
    else if(k==='Escape')backToOverworld();
    else if(k==='i'||k==='I')showInventory();
  } else if(G.scene==='fps'){
    if(k==='ArrowUp'||k===' ')fpsForward(1);
    else if(k==='ArrowDown')fpsForward(-1);
    else if(k==='ArrowLeft')G.dir=(G.dir+3)%4;
    else if(k==='ArrowRight')G.dir=(G.dir+1)%4;
    else if(k==='Escape')say(["You retreat toward the surface."],"",()=>backToOverworld());
    else if(k==='i'||k==='I')showInventory();
  } else if(G.scene==='stadium'){
    if(k==='ArrowUp')SD.facing=0; else if(k==='ArrowRight')SD.facing=1;
    else if(k==='ArrowDown')SD.facing=2; else if(k==='ArrowLeft')SD.facing=3;
    else if(k==='Escape'){ SD=null; G.scene=G.scene_prevSD||'town'; }
  } else if(G.scene==='museum'){
    const pads=museumPads(),cols=museumCols();
    if(k==='ArrowRight')P.mi=clamp(P.mi+1,0,pads.length-1);
    else if(k==='ArrowLeft')P.mi=clamp(P.mi-1,0,pads.length-1);
    else if(k==='ArrowDown')P.mi=clamp(P.mi+cols,0,pads.length-1);
    else if(k==='ArrowUp')P.mi=clamp(P.mi-cols,0,pads.length-1);
    else if(k===' '||k==='Enter')viewExhibit();
    else if(k==='t'||k==='T')talkCaretaker();
    else if(k==='Escape')backToOverworld();
    else if(k==='i'||k==='I')showInventory();
  }
});
function showInventory(){
  const items=Object.keys(G.inv);
  const FOOD={Rations:1,Meat:1,'Juton Fruit':1};
  const list=[
    {label:"STR "+G.str+" · END "+G.end+" · DEX "+G.dex+" · INT "+G.intel+" · CHA "+G.cha,sub:''},
    {label:"Weapon: "+G.weapon+" (dmg "+G.wdmg+")   Armor: "+G.armor+" (def "+G.adef+")",sub:''},
    {label:"Food: "+G.food+"/"+G.maxfood+"   Coins: "+COIN_LABEL.bronze+G.coins.bronze+" "+COIN_LABEL.silver+G.coins.silver+" "+COIN_LABEL.gold+G.coins.gold,sub:''},
  ];
  const spells=Object.keys(G.spells||{}).filter(s=>G.spells[s]>0);
  if(spells.length) list.push({label:"Spells: "+spells.map(s=>s+"×"+G.spells[s]).join(', '),sub:''});
  list.push({label:"— Items (tap food to eat) —",sub:''});
  if(items.length) items.forEach(n=>list.push({label:(FOOD[n]?'🍴 ':'')+n,sub:'×'+G.inv[n],eat:!!FOOD[n],item:n}));
  else list.push({label:"(no items)",sub:''});
  openMenu("Inventory & Stats",list,(it)=>{ if(it&&it.eat){ eatFood(it.item); showInventory(); } });
}
function showQuestLog(){
  const stages=["Awaken in the Galactic Museum","Hear the Caretaker's plea","Recover the Crown & Scepter of Mancella",
    "Return the treasures","Receive the Magic Ice","Learn of the warlord","Hunt the 4 magic jewels","Return the jewels","Tarmalon is saved"];
  const cur=clamp(G.questStage,0,stages.length-1);
  const list=stages.map((s,i)=>({label:(i<G.questStage?'✓ ':(i===cur?'➤ ':'· '))+s,sub:''}));
  list.push({label:"Jewels: "+G.jewels+"/4   ·   Coins "+COIN_LABEL.bronze+G.coins.bronze+" "+COIN_LABEL.silver+G.coins.silver+" "+COIN_LABEL.gold+G.coins.gold,sub:''});
  if(G.mail) list.push({label:"✉ Deliver letter to "+G.mail.toName+" (+"+G.mail.reward+"g)",sub:''});
  list.push({label:"Tip: "+pick(HINTS),sub:''});
  openMenu("Quest — Neutralize the Wizards' Compendium",list,()=>{});
}

/* ===================== Ending ===================== */
function showEnding(){
  G.scene='ending';
  $('hud').style.display='none';setHint("");
}

/* ===================== Title ===================== */
let stars=[];
function initStars(){stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*2+.3});}
initStars();
// Authentic decoded castle-map ribbon, slowly scrolling as a parallax backdrop
const CASTLE=CONTENT.castle_grid||[];
function castleColor(v){ // categorical color from decoded tile id
  if(v===0) return null;
  const h=((v*0.61803398875)%1.0); const s=0.5,l=0.5;
  // hsl->rgb quick
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs(((h*6)%2)-1)), m=l-c/2;
  let r,g,b; const hh=h*6;
  if(hh<1){r=c;g=x;b=0}else if(hh<2){r=x;g=c;b=0}else if(hh<3){r=0;g=c;b=x}
  else if(hh<4){r=0;g=x;b=c}else if(hh<5){r=x;g=0;b=c}else{r=c;g=0;b=x}
  return `rgb(${(r+m)*180|0},${(g+m)*180|0},${(b+m)*200|0})`;
}
function renderTitle(){
  ctx.fillStyle='#03040a';ctx.fillRect(0,0,W,H);
  // decoded castle map drifting in the lower third (authentic recovered data)
  if(CASTLE.length){
    const ts=6, off=(wob*0.15)% (CASTLE[0].length*ts);
    ctx.globalAlpha=0.18;
    for(let y=0;y<CASTLE.length;y++)for(let x=0;x<CASTLE[y].length;x++){
      const c=castleColor(CASTLE[y][x]); if(!c)continue;
      ctx.fillStyle=c; ctx.fillRect(((x*ts-off)%(CASTLE[0].length*ts))+ (W-CASTLE[0].length*ts)/2, H-CASTLE.length*ts*0.7+y*ts*0.7, ts, ts*0.7);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(3,4,10,0.55)';ctx.fillRect(0,0,W,H);
  }
  for(const s of stars){ctx.fillStyle=`rgba(180,200,255,${.3+s.z*.3})`;ctx.fillRect(s.x,s.y,s.z,s.z);
    s.x-=s.z*0.3; if(s.x<0){s.x=W;s.y=Math.random()*H;}}
  // planet Tarmalon
  const cx=W*0.5,cy=H*0.42,r=70;
  const g=ctx.createRadialGradient(cx-20,cy-20,10,cx,cy,r);
  g.addColorStop(0,'#3a7fd0');g.addColorStop(.6,'#1d4a8a');g.addColorStop(1,'#0a1f45');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fill();
  ctx.fillStyle='rgba(120,200,120,.5)';
  for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(cx+Math.sin(wob*0.01+i)*20-10,cy-20+i*16,18-i*2,5,0.3,0,7);ctx.fill();}
  // ring
  ctx.strokeStyle='rgba(244,200,96,.4)';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,cy,r+24,16,0.5,0,7);ctx.stroke();ctx.lineWidth=1;
}
function renderEnding(){
  ctx.fillStyle='#03040a';ctx.fillRect(0,0,W,H);
  for(const s of stars){ctx.fillStyle=`rgba(244,220,160,${.3+s.z*.4})`;ctx.fillRect(s.x,s.y,s.z,s.z);s.y+=s.z*0.2;if(s.y>H)s.y=0;}
  ctx.fillStyle='#f4c860';ctx.textAlign='center';ctx.font='bold 26px serif';
  ctx.fillText('TARMALON IS SAVED',W/2,H*0.32);
  ctx.fillStyle='#e8edff';ctx.font='13px sans-serif';
  const lines=["The Wizards' Compendium is sealed by the four magic jewels.",
    "The Galactic Medal of Honor gleams upon your chest.",
    "","Lv "+G.lvl+"  ·  "+G.steps+" steps walked  ·  "+Object.keys(G.exhibitsSeen).length+" exhibits viewed",
    "","Thank you for playing this reconstruction.","Press Space to return to the title."];
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H*0.45+i*20));
}

/* ===================== Boot / loop ===================== */
let last=0;
function loop(ts){
  const dt=Math.min(64, ts-last); last=ts;
  if(G&&G.scene==='stadium'&&!menuOpen&&!dlgOpen) sdUpdate(dt);
  if(!G||G.scene==='title') renderTitle();
  else if(G.scene==='ending') renderEnding();
  else render();
  tickType(dt);
  musicTick();
  if(toastT>0){toastT-=dt; if(toastT<=0)$('toast').classList.remove('show');}
  updateHUD(); updateTouchVisible();
  requestAnimationFrame(loop);
}
function startGame(){
  newGame(); G.scene='overworld'; $('title').style.display='none'; setHint(OW_HINT);
  musicStart(); setTrack('theme'); spawnRoamers();
  say([
    "PLANET TARMALON. You wake at the gates of a Galactic Museum, an ancient gold bracelet on your wrist and a strange leather scroll in your pack.",
    "A voice stirs in your mind. Enter the Museum 🏛 to the north-east to learn your purpose — or explore the lands of Tarmalon first.",
  ],"Legacy of the Ancients");
}
$('btnNew').onclick=startGame;
$('btnAbout').onclick=()=>{ if(!AC)musicStart(); say([
  "This is a modern, playable reconstruction of Legacy of the Ancients (Electronic Arts, 1987).",
  "Following the dos-decode-kit method, the original DOS files were cracked: BSAVE containers opened, tile-grid maps recovered (the castle, towns and dungeons), and the museum's exhibit text and town hints decoded byte-for-byte.",
  "Every museum exhibit you read here is the ACTUAL text from the 1987 game data. The drifting map behind this title is the real decoded CASTLE map. The world, combat, shops and music are a faithful modern re-imagining of the original loop.",
  "Honesty note: the title-screen bitmap (TITLE.GLB/GMP) is RLE-compressed — the 'graphics wall' the kit itself flags as the part that required the now-retired Fable model. It did not crack cleanly on Opus alone, so this title uses verified-correct decoded data (the castle map) rather than a wrong guess.",
],"About");};
$('titletag').innerHTML="Decoded from the original 1987 EA DOS files and rebuilt for the browser.<br>The museum exhibits you'll read — and the map drifting behind this title — are real decoded originals.<br><span style='color:#5cc6ff;letter-spacing:.1em'>build "+BUILD+"</span>";

addEventListener('keydown',e=>{ if(G&&G.scene==='ending'&&e.key===' '){G=null;refreshTitle();$('title').style.display='flex';} });
addEventListener('keydown',e=>{ if((e.key==='p'||e.key==='P')&&!dlgOpen&&!menuOpen){ if(!AC)musicStart(); musicToggle(); } });
$('musbtn')&&($('musbtn').onclick=()=>{ if(!AC)musicStart(); musicToggle(); });
// HUD + title + import bindings
$('savebtn')&&($('savebtn').onclick=()=>{ if(G&&G.scene!=='title'&&G.scene!=='ending')saveGame(); });
$('loadbtn')&&($('loadbtn').onclick=()=>{ loadGame(); });
$('sysbtn')&&($('sysbtn').onclick=()=>{ if(G&&G.scene==='overworld')systemMenu(); });
$('btnContinue')&&($('btnContinue').onclick=()=>{ loadGame(); });
$('btnImport')&&($('btnImport').onclick=()=>importSave());
$('fileimport')&&($('fileimport').onchange=e=>{ const f=e.target.files[0]; if(f)handleImport(f); e.target.value=''; });
function refreshTitle(){ const c=$('btnContinue'); if(c) c.style.display=hasSave()?'inline-block':'none'; }
refreshTitle();

/* ===================== Touch controls (mobile) ===================== */
let IS_TOUCH=false;
try{ IS_TOUCH = ('ontouchstart' in window) || (typeof navigator!=='undefined' && navigator.maxTouchPoints>0)
   || (window.matchMedia && window.matchMedia('(pointer:coarse)').matches); }catch(e){}
function pressKey(k){ try{ window.dispatchEvent(new KeyboardEvent('keydown',{key:k,bubbles:true})); }catch(e){} }
(function bindTouch(){
  const root=$('touch'); if(!root||!root.querySelectorAll) return;
  root.querySelectorAll('.tb').forEach(b=>{
    const k=b.getAttribute&&b.getAttribute('data-k'); if(!k) return;
    const down=ev=>{ ev.preventDefault(); if(!AC)musicStart();
      if(dlgOpen){ advanceDlg(); } else { pressKey(k); }
      b.classList.add('act'); };
    const up=()=>b.classList.remove('act');
    b.addEventListener&&b.addEventListener('pointerdown',down,{passive:false});
    b.addEventListener&&b.addEventListener('pointerup',up);
    b.addEventListener&&b.addEventListener('pointercancel',up);
    b.addEventListener&&b.addEventListener('pointerleave',up);
  });
  const dlg=$('dlg'); dlg&&dlg.addEventListener&&dlg.addEventListener('pointerdown',ev=>{ if(dlgOpen){ev.preventDefault();advanceDlg();} });
})();
function updateTouchVisible(){
  const t=$('touch'); if(!t) return;
  let narrow=false; try{narrow=window.innerWidth<820;}catch(e){}
  const show = G && G.scene!=='title' && G.scene!=='ending' && (IS_TOUCH||narrow);
  t.style.display = show?'block':'none';
}
try{ addEventListener('resize',resize); addEventListener('orientationchange',()=>setTimeout(resize,250)); }catch(e){}
resize();

requestAnimationFrame(loop);
</script>
