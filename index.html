<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legacy of the Ancients — Reconstructed</title>
<style>
  :root{
    --bg:#070912; --panel:#0e1426; --panel2:#141d36; --ink:#e8edff;
    --gold:#f4c860; --gold2:#b8893a; --accent:#5cc6ff; --good:#7ee08a;
    --bad:#ff6b6b; --dim:#8a93b8; --line:#27314f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;overflow:hidden;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:min(100vw,calc(100vh*1.5));height:min(100vh,calc(100vw/1.5));
    background:#000;box-shadow:0 0 60px #000 inset, 0 0 80px rgba(0,0,0,.8);}
  canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;display:block;}
  /* UI overlays */
  .layer{position:absolute;inset:0;pointer-events:none;}
  .panel{position:absolute;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.6);
    pointer-events:auto;}
  .gold{color:var(--gold)}
  .btn{display:inline-block;cursor:pointer;border:1px solid var(--gold2);
    background:linear-gradient(180deg,#1b2b4a,#10182c);color:var(--gold);
    padding:.55em 1.1em;border-radius:8px;font-weight:600;letter-spacing:.03em;
    transition:.12s;user-select:none;}
  .btn:hover{background:var(--gold);color:#1a1205;border-color:var(--gold);}
  /* Dialogue box */
  #dlg{left:4%;right:4%;bottom:4%;min-height:22%;padding:18px 22px;display:none;
    font-size:clamp(13px,2.1vh,20px);line-height:1.5;}
  #dlg .who{color:var(--gold);font-weight:700;letter-spacing:.04em;margin-bottom:6px;
    text-transform:uppercase;font-size:.8em;}
  #dlg .txt{min-height:3em;}
  #dlg .cont{position:absolute;right:18px;bottom:10px;color:var(--accent);font-size:.7em;
    animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.2}}
  /* HUD */
  #hud{left:0;right:0;top:0;height:auto;display:none;}
  .hudbar{display:flex;gap:14px;padding:8px 14px;align-items:center;
    background:linear-gradient(180deg,rgba(8,12,24,.92),rgba(8,12,24,.0));font-size:clamp(11px,1.7vh,15px);}
  .stat{display:flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums;}
  .stat b{color:var(--gold);font-weight:700}
  .bar{width:90px;height:9px;background:#2a1414;border:1px solid #51202a;border-radius:5px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#ff5a5a,#ff8a5a);}
  .loc{margin-left:auto;color:var(--accent);font-weight:600;letter-spacing:.05em}
  /* Menu / lists */
  #menu{display:none;left:50%;top:50%;transform:translate(-50%,-50%);width:min(78%,640px);
    padding:22px 26px;font-size:clamp(13px,2vh,18px);max-height:86%;overflow:auto;}
  #menu h2{margin:.1em 0 .5em;color:var(--gold);font-weight:800;letter-spacing:.04em;}
  .row{display:flex;justify-content:space-between;padding:9px 12px;border:1px solid var(--line);
    border-radius:8px;margin:6px 0;cursor:pointer;background:rgba(255,255,255,.02);transition:.1s}
  .row:hover{background:rgba(244,200,96,.12);border-color:var(--gold2)}
  .row .sub{color:var(--dim);font-size:.82em}
  .closerow{text-align:center;color:var(--dim);margin-top:10px;cursor:pointer}
  .closerow:hover{color:var(--ink)}
  /* Title */
  #title{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;pointer-events:auto;overflow-y:auto;padding:18px 10px;}
  #title h1{font-size:clamp(26px,7vh,68px);margin:0;letter-spacing:.06em;font-weight:800;
    color:var(--gold);text-shadow:0 0 24px rgba(244,200,96,.45),0 3px 0 #000;line-height:1;}
  #title .sub{color:var(--accent);letter-spacing:.42em;margin:10px 0 4px;font-size:clamp(10px,2vh,16px);text-transform:uppercase}
  #title .tag{color:var(--dim);max-width:min(88%,520px);font-size:clamp(11px,1.8vh,15px);margin-top:18px;line-height:1.5}
  #title .menu{margin-top:34px;display:flex;flex-direction:column;gap:12px}
  .toast{position:absolute;left:50%;top:14%;transform:translateX(-50%);background:rgba(10,14,28,.95);
    border:1px solid var(--gold2);color:var(--gold);padding:8px 18px;border-radius:20px;
    font-size:clamp(12px,1.8vh,15px);pointer-events:none;opacity:0;transition:.3s;font-weight:600}
  .toast.show{opacity:1}
  .center-hint{position:absolute;left:0;right:0;bottom:2.5%;text-align:center;color:var(--dim);
    font-size:clamp(10px,1.5vh,13px);pointer-events:none}
  .fade{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .35s;}
  .vignette{position:absolute;inset:0;pointer-events:none;
    box-shadow:0 0 140px rgba(0,0,0,.7) inset;}
  kbd{background:#1b2440;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;
    padding:1px 6px;font-size:.85em;color:var(--ink)}
  /* Touch controls — fixed to the whole screen so they sit below the game band on phones */
  #touch{position:fixed;inset:0;z-index:80;pointer-events:none;}
  #touch .tb{pointer-events:auto;user-select:none;-webkit-user-select:none;touch-action:none;
    display:flex;align-items:center;justify-content:center;color:var(--ink);
    background:linear-gradient(180deg,rgba(40,52,86,.82),rgba(16,24,44,.82));
    border:1px solid var(--line);border-radius:12px;font-size:clamp(18px,3.4vh,26px);
    box-shadow:0 3px 10px rgba(0,0,0,.5);backdrop-filter:blur(2px);}
  #touch .tb.act{background:var(--gold);color:#1a1205;border-color:var(--gold);transform:scale(.94);}
  .dpad{position:absolute;left:max(14px,4%);bottom:calc(env(safe-area-inset-bottom,0px) + max(18px,3%));
    display:grid;grid-template-columns:repeat(3,clamp(50px,15vw,68px));
    grid-template-rows:repeat(3,clamp(50px,15vw,68px));gap:7px;
    grid-template-areas:". up ." "left mid right" ". down .";opacity:.95;}
  .tb-up{grid-area:up}.tb-down{grid-area:down}.tb-left{grid-area:left}.tb-right{grid-area:right}
  .tb-mid{grid-area:mid;background:transparent!important;border:none!important;box-shadow:none!important;pointer-events:none!important;}
  .acts{position:absolute;right:max(14px,4%);bottom:calc(env(safe-area-inset-bottom,0px) + max(18px,3%));display:flex;flex-direction:column;
    align-items:flex-end;gap:12px;opacity:.95;}
  .abrow{display:flex;gap:12px;align-items:center;}
  .btnA{width:clamp(62px,12vh,84px);height:clamp(62px,12vh,84px);border-radius:50%!important;
    font-weight:800;color:var(--gold)!important;border-color:var(--gold2)!important;font-size:clamp(20px,3.6vh,28px)!important;}
  .btnB{width:clamp(48px,9vh,64px);height:clamp(48px,9vh,64px);border-radius:50%!important;color:var(--dim)!important;}
  .minirow{display:flex;gap:8px;}
  .mini{width:clamp(40px,7.5vh,52px);height:clamp(40px,7.5vh,52px);font-size:clamp(15px,2.6vh,20px)!important;border-radius:10px;}

  /* ===== Mobile / portrait overrides (placed LAST so they win the cascade) ===== */
  @media (max-aspect-ratio: 3/2){
    #wrap{align-items:stretch !important;}
    #stage{width:100vw !important; height:100vh !important; height:100dvh !important;}
    /* lift dialogue & menu clear of the on-screen controls */
    #dlg{bottom:calc(env(safe-area-inset-bottom,0px) + 250px) !important; max-height:34vh; overflow:auto;}
    #menu{max-height:62vh;}
    #chint{display:none;}
  }
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <canvas id="cv" width="480" height="320"></canvas>
  <div class="vignette"></div>

  <!-- HUD -->
  <div class="layer" id="hud"><div class="hudbar">
    <div class="stat">❤ <div class="bar"><i id="hpfill"></i></div><span id="hptxt"></span></div>
    <div class="stat">⚔ Lv<b id="lvl">1</b></div>
    <div class="stat" title="Food">🍖<b id="xp">0</b></div>
    <div class="stat">💰<b id="gold">0</b></div>
    <div class="stat" title="Museum coins" id="coins" style="font-size:.92em"></div>
    <div class="loc" id="loc">Tarmalon</div>
    <div class="stat" id="savebtn" title="Save game" style="cursor:pointer;font-size:1.05em;color:var(--good)">💾</div>
    <div class="stat" id="loadbtn" title="Load game" style="cursor:pointer;font-size:1.05em;color:var(--accent)">📂</div>
    <div class="stat" id="sysbtn" title="System menu (Esc)" style="cursor:pointer;font-size:1.05em;color:var(--dim)">⚙</div>
    <div class="stat" id="musbtn" title="Toggle music (P)" style="cursor:pointer;font-size:1.2em;color:var(--gold)">♪</div>
  </div></div>
  <input type="file" id="fileimport" accept="application/json,.json" style="display:none">


  <!-- Dialogue -->
  <div class="panel" id="dlg">
    <div class="who" id="dwho"></div>
    <div class="txt" id="dtxt"></div>
    <div class="cont" id="dcont">▼ space</div>
  </div>

  <!-- Generic menu -->
  <div class="panel" id="menu"></div>

  <!-- Title -->
  <div id="title" class="layer">
    <div class="sub">A Galactic Museum Adventure</div>
    <h1>LEGACY OF<br>THE ANCIENTS</h1>
    <div class="sub" style="letter-spacing:.2em;color:var(--dim)">Planet Tarmalon · Reconstructed Edition</div>
    <div class="tag" id="titletag"></div>
    <div class="menu">
      <div class="btn" id="btnNew">Begin the Quest</div>
      <div class="btn" id="btnContinue" style="display:none">Continue</div>
      <div class="btn" id="btnImport" style="font-size:.85em;border-color:var(--line);background:#10182c;color:var(--dim)">Load save file…</div>
      <div class="btn" id="btnAbout" style="font-size:.85em;border-color:var(--line);background:#10182c;color:var(--dim)">About this reconstruction</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="center-hint" id="chint"></div>
  <div class="fade" id="fade"></div>
</div></div>

<!-- Touch controls (mobile) — fixed to the viewport, below the game band -->
<div id="touch" style="display:none">
  <div class="dpad">
    <div class="tb tb-up" data-k="ArrowUp">▲</div>
    <div class="tb tb-left" data-k="ArrowLeft">◀</div>
    <div class="tb tb-mid"></div>
    <div class="tb tb-right" data-k="ArrowRight">▶</div>
    <div class="tb tb-down" data-k="ArrowDown">▼</div>
  </div>
  <div class="acts">
    <div class="minirow">
      <div class="tb mini" data-k="i" title="Inventory">🎒</div>
      <div class="tb mini" data-k="m" title="Quest">📜</div>
      <div class="tb mini" data-k="Escape" title="Menu / Back">⚙</div>
    </div>
    <div class="abrow">
      <div class="tb btnB" data-k="Escape">B</div>
      <div class="tb btnA" data-k=" ">A</div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   LEGACY OF THE ANCIENTS — modern reconstruction
   Content (museum exhibits, town hints, map grids) decoded from
   the original 1987 EA DOS files via the dos-decode-kit method.
   ============================================================ */
const CONTENT = {"museum": ["Eons ago, nomadic warriors roamed the planet Tarmalon. They hunted and fought with stone knives, much like the one you see in this exhibit. This knife is primitive - but effective. As a Museum patron, you may take it for as long as you like. The knife is now in your inventory.", "As Tarmalon culture advanced, weapons developed a ceremonial importance. In this exhibit you see the famed staff of sacrifice. It was used to coronate kings. Although intended for ceremony, the staff is actually bladed for combat. As a Museum patron, you may use this weapon for as long as you like. It is now in your possession.", "This exhibit shows a typical Tarmalon town called Thornberry. The town was established over 100 lifespans ago by a group of wealthy merchants. Thornberry has changed little since its founding. The rich and the poor still live on opposite sides of town separated by a massive stone wall. Despite its inequity, Thornberry is a bustling community, containing shops, craftsmen, banks, and places of amusement.", "Here's some gold to spend on your trip. armalon's deep ocean waters are so turbulent that few trading ships ever venture far from shore. Yet, long ago, the oceans were calm and ocean travel flourished. As time went by, pirates came to rule the seas. They preyed on helpless vessels, taking gold, weapons, armor and supplies. Their treasures were stored in deep caves on remote islands. This booty was guarded by paid soldiers and by animals bred for their ferocity. When the oceans became rougher, many of the caves could no longer be reached. In this exhibit, you see the entrance to one such cave. The wealth stored within is enormous.", "The pirate's lair is located in a chain of islands called the \"Three Sisters.\" You will be transported to the largest island. From there, you're on your own. The pirate's lair has many levels. At the very bottom, it is said, lies a priceless SAPPHIRE!", "Planet natives believe in the curative power of a variety of \"healing herbs.\" However, the effectiveness of these plants has never been verified by Museum personnel. This display contains a Juton bush. According to lore, its fruit increases the power of other native herbs. While this claim is doubtful, the fruit is really quite tasty. You may sample one.", "Here you see a replica of the famous enchanted Flower Fountain. Legend says that its waters once flowed in splendor. One day a tulip was taken from the Fountain gardens and the Fountain waters stopped. The stories say that only when that flower is returned will the fountain flow again. Myth or fact? Judge for yourself. In either case, the Museum has agreed to help search for the Tulip.", "Bring the Tulip back here for a nice reward. Meanwhile, here's some native gold to aid you in your search. hank you for returning the Tulip! As a reward, Charm: +10 ifferent planets have different treasures. On Tarmalon, as on many planets, the scarcity of GOLD makes it exceedingly valuable. Here you see the Museum currency room. It contains a small (but noteworthy) portion of the planet's wealth. You are welcome to a sample.", "Stones of Wisdom is probably the most popular bar-room game on Tarmalon. It is not only fun, but said to help develop a player's intelligence.", "This giant tapestry is actually a map of the planet Tarmalon. It's the only remaining world map made by Tarmalon natives. This Museum is located in the north- east portion of the main continent. Baron Kelfor's castle is on an island in the major inland lake. Near the bottom left of the tapestry, you can see the chain of islands called the \"THREE SISTERS.\" A large pirate's lair is said to be on one of these islands.", "The underground catacombs of Armak are infamous for their twisting passageways and deadly monsters. To venture there, it is said, is almost certain death. Yet, for many years, the rulers of Tarmalon have cast their best knights into these dungeon depths. Only a few ever make it back to the surface. Those who survive become tougher, fiercer, and wiser. They emerge virtually unbeatable in battle. You now face the same test, for in a moment, you'll find yourself at the very bottom of Armak. the way out lies far above. The risk is great - the PAYOFF is GREATER!!", "As you well know, some exhibits in this museum can be deadly, but you haven't even seen the most dangerous displays. Many years ago, the innermost section of this museum was blocked off. Some exhibits found there were just too dangerous. Museum insurance rates were skyrocketing! Since you have succeeded where many others have failed, this part of the Museum will be open to you from now on. Perhaps you have a chance. Probably, you don't.", "Legends say that 13 great wizards once ruled Tarmalon, but that little of their power remains. Those who escaped death and treachery ultimately succumbed to the ravages of time. The wax figure before you is the Wizard of Arovyn. His power largely gone, he is said to be imprisoned deep within Kelfor castle. Only the pass- word 'guardians' will open his door.", "This exhibit shows the gateway to Tarmalon's most dangerous dungeon. It is largely this exhibit which caused the inner section of the Museum to be closed off to casual explorers. The Museum has not charted this dungeon, and has little knowledge of its contents. We know primarily that nobody has yet emerged alive.", "This magnificent beast was found frozen to a high cliff near the Museum. Locals say that PEGASUS stood alert for over a lifespan - poised as if ready to fly. Finally, the magical animal succumbed to the bitter cold.", "Suddenly, the ice covering PEGASUS cracks apart! The winged horse looks at you with probing eyes, and then lowers one wing, as if asking you to climb on.", "Welcome, noble traveler, to this Galactic Museum on the planet of Tarmalon. The Museum provides views and gateways to many fascinating aspects of planetary life. Use standard coins to view exhibits. Please do not give away coins, or feed the Tarmalon natives. Have a nice day!", "Your gold bracelet glows. A strange voice sounds inside your head... Do not be alarmed. You are just hearing my thoughts, as recorded by the bracelet. Since you are now wearing my bracelet, I must be dead. I therefore charge you to continue my mission: to neutralize the evil Scroll of Spells before it destroys everything! You see, the leather Scroll you now carry is the immensely evil Wizards' Compendium. Since it cannot be destroyed outright, you must learn how to render its magic harmless. BEWARE! There are those who would think nothing of killing you in order to possess the magic Compendium. There is little more to tell. By now, you must be inside the Galactic Museum, your entrance gained by the bracelet and my obsidian code-disk. This museum was built by a race of ancient beings, who constructed many such museums on many different planets. These \"ANCIENTS\" designed each museum for their own amusement. If you're clever, you'll find many answers here. Yet, since you're not one of the ancients, you'll have to scrounge around the countryside for coins to view exhibits. REMEMBER YOUR QUEST. Good luck.", "\"WELCOME TO OUR MUSEUM! I am the Museum Caretaker. Although my influence outside this museum is limited, I'll provide you with help and information whenever I can. \"Right now, you should explore the world around you. Feel free to use the Museum exhibits or, if you'd rather, use the doors to go directly outside.\"", "\"Perhaps you are now strong enough to help me. Long ago, two priceless specimens were stolen from the Museum: The jewelled Crown and Scepter of MANCELLA.\" \"Although Museum policy will not let me recover them, perhaps you would like to try. I don't know where the Crown and Scepter are, but I have a key which should help you.\" \"Naturally, there's a reward.\"", "\"Congratulations on finding the Scepter! While you were away, I discovered one more thing about the Crown. It is stored far away from the castle, deep underground.\"", "\"I'm glad you've found the Crown! I've discovered one more thing about the Scepter. It is hidden somewhere on this continent.\"", "\"THE SCEPTER AND CROWN! This is truly a great day for the Tarmalon Museum. I want you to have this MAGIC ICE. It may help you someday. It works best inside.\"", "\"I have disturbing news. A merchant in Big Rapids has been killed by marauders from across the sea.\"", "\"Laingsburg is under attack. Rumor has it that the Wizards' Compendium is behind it all.\"", "\"The healer in Holy Point is now missing. I fear that the entire planet is in great danger. If you don't recover the Compendium soon, all will be lost.\"", "\"I've heard that your magic Scroll was stolen. My sources say that it was sold a few days later on the black market.\"", "\"Your stolen Scroll must be important! I hear that it has been sold to a powerful and cruel warlord. You will need to gain strength and wisdom before you can recover the Scroll.\"", "\"The evil warlord is apparently using the Wizards' Compendium to create powerful spells of destruction.\" \"The warlord lives in a fortress far across the sea. It is said to be very difficult to reach.\"", "\"You must do more before I can help you again. You may use the Museum exhibits or explore the lands outside.\"", "\"Thank you and good luck. Here is the key. If you find the Scepter and Crown, please bring them back to this exhibit.\"", "\"You have shown bravery against all odds. You have revealed selfless dedication in the face of adversity. By my power as Caretaker, I award thee the Galactic Medal of Honor!!!\"", "\"This medallion, the Museum's highest honor, has been awarded to only a handful of explorers across the galaxy. Wear it with Pride!! \"and now, allow me to present our newest display...\" his Wizards' Compendium was crafted by Tarmalon wizards millenia ago. It has just returned to exhibit, after mysteriously disappearing several years ago. During its absence, this Scroll const BATTLE_LEAD=[12,12,15,12,17,12,15,12, 13,13,16,13,18,13,16,13];
function musicToggle(){MUSIC.on=!MUSIC.on; if(!MUSIC.on){/*notes just stop scheduling*/} toast(MUSIC.on?"Music on":"Music off"); $('musbtn')&&($('musbtn').textContent=MUSIC.on?'♪':'♪̶');}
function musicStart(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}} if(AC.state==='suspended')AC.resume(); MUSIC.playing=true; MUSIC.nextT=AC.currentTime+0.1; MUSIC.step=0; }
function setTrack(t){ if(MUSIC.track!==t){MUSIC.track=t; MUSIC.step=0;} }
function noteOn(freq,t,dur,type,vol){
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=freq;
  o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);
}
function musicTick(){
  if(!MUSIC.playing||!MUSIC.on||!AC) return;
  const spb=(MUSIC.track==='battle')?0.16:0.22; // seconds per step
  while(MUSIC.nextT < AC.currentTime+0.2){
    const lead = MUSIC.track==='battle'?BATTLE_LEAD:THEME_LEAD;
    const li = MUSIC.step % lead.length;
    noteOn(SCALE(lead[li]+24), MUSIC.nextT, spb*0.9, 'square', 0.05);
    if(MUSIC.track!=='battle'){
      const bi=MUSIC.step%THEME_BASS.length;
      if(MUSIC.step%2===0) noteOn(SCALE(THEME_BASS[bi]), MUSIC.nextT, spb*1.6, 'triangle', 0.08);
    } else {
      if(MUSIC.step%2===0) noteOn(SCALE(0+12), MUSIC.nextT, spb*1.2, 'sawtooth', 0.06);
    }
    MUSIC.nextT+=spb; MUSIC.step++;
  }
}

// Tile codes: 0 deep water,1 water,2 grass,3 forest,4 mountain,5 sand,6 road,
// 7 museum,8 town,9 dungeon,10 castle,11 bridge,12 flowers
let OWMAP = null;
function buildOverworld(){
  const w=80,h=60;
  const m=Array.from({length:h},()=>Array(w).fill(2));
  // base noise: forests & mountains
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const n=Math.sin(x*0.3)+Math.cos(y*0.27)+Math.sin((x+y)*0.15);
    if(n>1.3) m[y][x]=3; else if(n>1.05) m[y][x]=4;
    if((x+y*7)%53===0) m[y][x]=3;
  }
  // ocean borders + a great lake
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    if(x<3||y<3||x>w-4||y>h-4) m[y][x]=(x<2||y<2||x>w-3||y>h-3)?0:1;
  }
  // inland lake (castle island)
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=x-58,dy=y-16; if(dx*dx+dy*dy<70) m[y][x]=1;
    if(dx*dx+dy*dy<10) m[y][x]=2; // island
  }
  // sandy southwest (three sisters)
  for(let y=44;y<56;y++)for(let x=4;x<20;x++){ if(chance(.5)) m[y][x]= (chance(.4)?5:1); }
  function place(x,y,t){m[y][x]=t;}
  function road(x1,y1,x2,y2){ // simple L road
    let x=x1,y=y1;
    while(x!==x2){ if(m[y][x]!==7&&m[y][x]!==8&&m[y][x]!==9&&m[y][x]!==10) m[y][x]=(m[y][x]<=1?11:6); x+=Math.sign(x2-x);}
    while(y!==y2){ if(m[y][x]!==7&&m[y][x]!==8&&m[y][x]!==9&&m[y][x]!==10) m[y][x]=(m[y][x]<=1?11:6); y+=Math.sign(y2-y);}
  }
  // Landmarks (the Museum is the hub, NE per the world tapestry exhibit)
  LANDMARKS.forEach(L=>place(L.x,L.y,L.tile));
  // roads connecting key spots to museum
  const mus=LANDMARKS.find(l=>l.id==='museum');
  LANDMARKS.filter(l=>l.id!=='museum').forEach(L=>road(mus.x,mus.y,L.x,L.y));
  // clear walkable ring around each landmark
  LANDMARKS.forEach(L=>{for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const nx=L.x+dx,ny=L.y+dy; if(nx>0&&ny>0&&nx<w-1&&ny<h-1&&(dx||dy)&&m[ny][nx]<=1) m[ny][nx]=2;}});
  return {w,h,m};
}

/* ===================== Dungeon (from decoded grid) ===================== */
function buildDungeon(){
  const grid=CONTENT.dungeon_grid;
  const h=grid.length, w=grid[0].length;
  // map raw tile-ids: 0xff(255)=wall, else floor/feature. Build clean maze.
  const m=Array.from({length:h},(_,y)=>Array.from({length:w},(_,x)=>grid[y][x]===255?31:30));
  // ensure an entry & exit (stairs up = goal)
  let sx=1,sy=1; outer: for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){if(m[y][x]===30){sx=x;sy=y;break outer;}}
  // place exit far away (last floor tile)
  let ex=sx,ey=sy; for(let y=h-2;y>0;y--)for(let x=w-2;x>0;x--){if(m[y][x]===30){ex=x;ey=y;y=0;break;}}
  m[ey][ex]=33; // stairs up
  // treasure chests on a few floor tiles
  const chests=[]; let placed=0;
  for(let y=1;y<h-1&&placed<6;y++)for(let x=1;x<w-1&&placed<6;x++){
    if(m[y][x]===30 && (x*7+y*13)%29===0 && !(x===sx&&y===sy)){m[y][x]=34;chests.push({x,y});placed++;}
  }
  return {w,h,m,sx,sy,ex,ey};
}

// Pirate's Lair — a watery sea-cave. Carved caverns with water channels (impassable),
// a few treasure chests, and the SAPPHIRE in the deepest chamber.
function buildPirateLair(){
  const w=34,h=26;
  const m=Array.from({length:h},()=>Array(w).fill(31)); // 31 = rock wall
  // carve caverns with a drunkard's-walk per chamber, connect rooms
  const rooms=[[3,3,8,6],[14,2,7,7],[24,4,7,8],[5,13,9,8],[18,12,12,6],[20,19,11,5],[3,20,8,4]];
  rooms.forEach(([rx,ry,rw,rh])=>{for(let y=ry;y<ry+rh&&y<h-1;y++)for(let x=rx;x<rx+rw&&x<w-1;x++)m[y][x]=30;});
  // corridors
  function carveH(y,x1,x2){for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)m[y][x]=30;}
  function carveV(x,y1,y2){for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)m[y][x]=30;}
  carveH(6,10,14);carveV(17,8,12);carveH(8,21,24);carveV(9,18,20);carveH(17,12,20);carveV(26,11,19);carveH(21,9,20);carveV(8,15,20);
  // water pools (36 = water, impassable but pretty)
  function pool(cx,cy,r){for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){
    if(x>0&&y>0&&x<w-1&&y<h-1&&Math.hypot(x-cx,y-cy)<=r&&m[y][x]===30)m[y][x]=36;}}
  pool(7,16,2);pool(27,7,2);pool(24,21,1);
  // start near top-left, exit (stairs) near top-left too (return), sapphire deepest
  const sx=4,sy=4; m[sy][sx]=30;
  m[4][5]=33; // stairs back up near entrance
  // chests scattered
  const chests=[[16,3],[28,6],[6,15],[26,13]];
  chests.forEach(([x,y])=>{if(m[y][x]===30)m[y][x]=34;});
  // SAPPHIRE in deepest chamber (bottom-right room)
  let bx=22,by=21; while(m[by][bx]!==30 && bx>20){bx--;} m[by][bx]=35;
  return {w,h,m,sx,sy,theme:'pirate'};
}

// Each creature drawn from simple canvas shapes. cx,cy = center, s = scale (px radius-ish)
function drawCreature(name, cx, cy, s, t){
  ctx.save();
  const bob=Math.sin((t||wob)*0.08)*s*0.06;
  cy+=bob;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(cx,cy+s*0.95,s*0.7,s*0.18,0,0,7);ctx.fill();
  const I=n=>name.indexOf(n)>=0;
  if(I('Slash Nettle')){ // spiky plant
    ctx.fillStyle='#2f8f3a';ctx.beginPath();ctx.ellipse(cx,cy,s*0.55,s*0.7,0,0,7);ctx.fill();
    ctx.strokeStyle='#1c5a24';ctx.lineWidth=Math.max(1,s*0.08);
    for(let a=0;a<8;a++){const ang=a/8*6.283;ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(ang)*s*0.9,cy+Math.sin(ang)*s*0.9);ctx.stroke();}
    ctx.fillStyle='#d6f25a';ctx.beginPath();ctx.arc(cx,cy,s*0.22,0,7);ctx.fill();
  } else if(I('Sea Swallow')){ // dart-like sea bird/fish
    ctx.fillStyle='#3aa0d0';ctx.beginPath();ctx.moveTo(cx-s,cy);ctx.quadraticCurveTo(cx,cy-s*0.7,cx+s,cy);
    ctx.quadraticCurveTo(cx,cy+s*0.7,cx-s,cy);ctx.fill();
    ctx.fillStyle='#bfe9ff';ctx.beginPath();ctx.moveTo(cx-s*0.2,cy);ctx.lineTo(cx-s*0.9,cy-s*0.6);ctx.lineTo(cx-s*0.4,cy);ctx.fill();
    ctx.fillStyle='#06243a';ctx.beginPath();ctx.arc(cx+s*0.5,cy-s*0.08,s*0.1,0,7);ctx.fill();
  } else if(I('Maston Leaper')){ // frog/toad leaper
    ctx.fillStyle='#7a9c3a';ctx.beginPath();ctx.ellipse(cx,cy+s*0.15,s*0.8,s*0.6,0,0,7);ctx.fill();
    ctx.fillStyle='#9ec24a';ctx.beginPath();ctx.ellipse(cx,cy-s*0.2,s*0.55,s*0.4,0,0,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-s*0.3,cy-s*0.35,s*0.2,0,7);ctx.arc(cx+s*0.3,cy-s*0.35,s*0.2,0,7);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx-s*0.3,cy-s*0.32,s*0.09,0,7);ctx.arc(cx+s*0.3,cy-s*0.32,s*0.09,0,7);ctx.fill();
  } else if(I('Agent')){ // cloaked figure
    ctx.fillStyle='#3a2a4a';ctx.beginPath();ctx.moveTo(cx,cy-s);ctx.lineTo(cx+s*0.7,cy+s*0.9);ctx.lineTo(cx-s*0.7,cy+s*0.9);ctx.closePath();ctx.fill();
    ctx.fillStyle='#0a0612';ctx.beginPath();ctx.arc(cx,cy-s*0.45,s*0.35,0,7);ctx.fill();
    ctx.fillStyle='#ff5a5a';ctx.fillRect(cx-s*0.18,cy-s*0.5,s*0.12,s*0.08);ctx.fillRect(cx+s*0.06,cy-s*0.5,s*0.12,s*0.08);
  } else if(I('Neural Cloud')){ // glowing cloud with eyes
    ctx.fillStyle='rgba(150,90,220,.85)';
    for(const o of [[-.5,0,.6],[.5,0,.6],[0,-.3,.7],[0,.2,.65]]){ctx.beginPath();ctx.arc(cx+o[0]*s,cy+o[1]*s,o[2]*s,0,7);ctx.fill();}
    ctx.fillStyle='#e6c8ff';for(const e of [[-.3,-.1],[.3,-.1]]){ctx.beginPath();ctx.arc(cx+e[0]*s,cy+e[1]*s,s*0.13,0,7);ctx.fill();}
    ctx.strokeStyle='rgba(200,160,255,.5)';ctx.lineWidth=s*0.05;ctx.beginPath();ctx.arc(cx,cy,s*1.05,0,7);ctx.stroke();
  } else if(I('Guard-Beast')||I('Marauder')){ // brute
    ctx.fillStyle='#7a4a2a';ctx.beginPath();ctx.ellipse(cx,cy+s*0.2,s*0.85,s*0.7,0,0,7);ctx.fill();
    ctx.fillStyle='#5a3320';ctx.beginPath();ctx.arc(cx,cy-s*0.4,s*0.45,0,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(cx-s*0.2,cy-s*0.1);ctx.lineTo(cx-s*0.05,cy+s*0.1);ctx.lineTo(cx-s*0.35,cy+s*0.1);ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+s*0.2,cy-s*0.1);ctx.lineTo(cx+s*0.35,cy+s*0.1);ctx.lineTo(cx+s*0.05,cy+s*0.1);ctx.fill();
    ctx.fillStyle='#ffd24a';ctx.beginPath();ctx.arc(cx-s*0.2,cy-s*0.45,s*0.1,0,7);ctx.arc(cx+s*0.2,cy-s*0.45,s*0.1,0,7);ctx.fill();
  } else if(I('Guard')){ // castle guard
    ctx.fillStyle='#5a6a8a';ctx.fillRect(cx-s*0.45,cy-s*0.5,s*0.9,s*1.2);
    ctx.fillStyle='#c0c8e0';ctx.beginPath();ctx.arc(cx,cy-s*0.55,s*0.3,0,7);ctx.fill();
    ctx.fillStyle='#caa24a';ctx.fillRect(cx+s*0.4,cy-s*0.9,s*0.12,s*1.5); // spear
  } else { // default creature — color varies by name so the roster looks distinct
    let hsh=0; for(let i=0;i<name.length;i++) hsh=(hsh*31+name.charCodeAt(i))&255;
    const hue=hsh/255, c=0.6,l=0.5, hh=hue*6, X=c*(1-Math.abs(hh%2-1));
    let r,gg,b; if(hh<1){r=c;gg=X;b=0}else if(hh<2){r=X;gg=c;b=0}else if(hh<3){r=0;gg=c;b=X}else if(hh<4){r=0;gg=X;b=c}else if(hh<5){r=X;gg=0;b=c}else{r=c;gg=0;b=X}
    const m=l-c/2;
    ctx.fillStyle=`rgb(${(r+m)*255|0},${(gg+m)*255|0},${(b+m)*255|0})`;
    ctx.beginPath();ctx.ellipse(cx,cy,s*0.7,s*0.62,0,0,7);ctx.fill();
    // spikes for menace
    ctx.fillStyle='rgba(0,0,0,.35)';for(let a=0;a<6;a++){const an=a/6*6.283;ctx.beginPath();ctx.moveTo(cx+Math.cos(an)*s*0.6,cy+Math.sin(an)*s*0.55);ctx.lineTo(cx+Math.cos(an)*s*0.85,cy+Math.sin(an)*s*0.8);ctx.lineTo(cx+Math.cos(an+0.3)*s*0.6,cy+Math.sin(an+0.3)*s*0.55);ctx.fill();}
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-s*0.22,cy-s*0.08,s*0.13,0,7);ctx.arc(cx+s*0.22,cy-s*0.08,s*0.13,0,7);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx-s*0.22,cy-s*0.06,s*0.06,0,7);ctx.arc(cx+s*0.22,cy-s*0.06,s*0.06,0,7);ctx.fill();
  }
  ctx.restore();
}

      let d=pick(dirs);
      if(chance(0.45)){ d=[Math.sign(G.px-r.x)||0, 0]; if(d[0]===0)d=[0,Math.sign(G.py-r.y)||0]; }
      const nx=r.x+d[0], ny=r.y+d[1];
      if(walk(nx,ny)){ r.x=nx; r.y=ny; }
    }
  }
}
function owWalk(x,y){ return x>1&&y>1&&x<OWMAP.w-2&&y<OWMAP.h-2 && isWild(OWMAP.m[y][x]) && !landmarkAt(x,y); }
function dunWalk(x,y){ return x>0&&y>0&&x<DUN.w-1&&y<DUN.h-1 && DUN.m[y][x]===30; }
function checkRoamerCollision(list){
  const tx=G.scene==='overworld'?G.px:P.x, ty=G.scene==='overworld'?G.py:P.y;
  const i=list.findIndex(r=>r.x===tx&&r.y===ty);
  if(i>=0){ const r=list[i]; list.splice(i,1); startBattle(Object.assign({},MONSTERS[r.mi])); return true; }
  return false;
}

/* ===================== Save / Load ===================== */
const SAVE_KEY='lota_save_v1';
function snapshot(){ return JSON.stringify({G,t:currentTownId,hintIdx,v:1}); }
function saveGame(){
  try{ localStorage.setItem(SAVE_KEY, snapshot()); toast('Game saved'); sfx('coin'); return true; }
  catch(e){ toast('localStorage blocked — use Export instead'); return false; }
}
function hasSave(){ try{ return !!localStorage.getItem(SAVE_KEY); }catch(e){ return false; } }
function restoreFrom(o){
  if(!o||!o.G){toast('Invalid save');return false;}
  G=o.G; currentTownId=o.t||null; hintIdx=o.hintIdx||0;
  $('title').style.display='none';
  if(!AC)musicStart(); setTrack('theme'); B=null; closeMenu();
  const sc=G.scene;
  if(sc==='town'){ TOWN=buildTown(); P.x=TOWN.w>>1; P.y=TOWN.h-2; }
  else if(sc==='dungeon'||sc==='fps'||sc==='stadium'){ G.scene='overworld'; toast('Returned to overworld'); } // safest
  else if(sc==='museum'){ P.mi=0; }
  if(G.scene==='overworld') setHint(OW_HINT);
  spawnRoamers(); spawnDunRoamers();
  return true;
}
function loadGame(){
  try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw){toast('No save found');return false;}
    if(restoreFrom(JSON.parse(raw))){ toast('Game loaded'); sfx('open'); return true; } }
  catch(e){ toast('Load failed'); }
  return false;
}
function exportSave(){
  try{ const b=new Blob([snapshot()],{type:'application/json'}); const u=URL.createObjectURL(b);
    const a=document.createElement('a'); a.href=u; a.download='legacy-of-the-ancients-save.json'; a.click();
    setTimeout(()=>URL.revokeObjectURL(u),1500); toast('Save file downloaded'); }catch(e){ toast('Export failed'); }
}
function importSave(){ const inp=$('fileimport'); if(inp) inp.click(); }
function handleImport(file){
  const fr=new FileReader();
  fr.onload=()=>{ try{ if(restoreFrom(JSON.parse(fr.result))) toast('Save imported'); }catch(e){ toast('Bad save file'); } };
  fr.readAsText(file);
}
function systemMenu(){
  openMenu("System",[
    {label:"Save game",sub:"to this browser"},
    {label:"Load game",sub:hasSave()?"":"(no save)"},
    {label:"Export save to file"},
    {label:"Import save from file"},
    {label:"Music: "+(MUSIC.on?"on":"off"),sub:"P"},
    {label:"Resume"},
  ],(it,i)=>{ if(i===0)saveGame(); else if(i===1)loadGame(); else if(i===2)exportSave();
    else if(i===3)importSave(); else if(i===4){if(!AC)musicStart();musicToggle();} });
}

/* ===================== Rendering ===================== */
// color palettes for procedural tiles
function shade(c,f){const n=parseInt(c.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=clamp(r*f|0,0,255);g=clamp(g*f|0,0,255);b=clamp(b*f|0,0,255);return `rgb(${r},${g},${b})`;}
function tileColor(t){
  switch(t){
    case 0:return '#0a2452'; case 1:return '#16407a'; case 2:return '#3f7a3a';
    case 3:return '#235a2e'; case 4:return '#6b6b78'; case 5:return '#c9b876';
    case 6:return '#9a7b4a'; case 11:return '#8a6a3a';
    case 7:return '#caa24a'; case 8:return '#b6603a'; case 9:return '#4a3a5a';
    case 10:return '#8a8aa8'; case 12:return '#3f7a3a';
    case 20:return '#5a5040'; case 21:return '#33384e'; case 22:return '#7a5a2a';
    case 23:return '#caa24a'; case 24:return '#16407a';
    case 30:return '#2a2236'; case 31:return '#13101c'; case 33:return '#caa24a'; case 34:return '#caa24a';
    case 35:return '#1a2a4a'; case 36:return '#16407a';
    default:return '#3f7a3a';
  }
}
function drawTile(t,sx,sy,wob){
  const base=tileColor(t);
  ctx.fillStyle=base; ctx.fillRect(sx,sy,TILE,TILE);
  // texture / icon per type
  ctx.save();
  if(t===1||t===0||t===24||t===36){ // water shimmer
    ctx.fillStyle=shade(base,1.3);
    const o=(wob+sx+sy)%TILE;
    ctx.fillRect(sx,sy+(o%6),TILE,2);
  } else if(t===3){ // forest
    ctx.fillStyle='#1a4322';ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle='#2f7a37'; for(let i=0;i<3;i++){const tx=sx+5+i*7,ty=sy+6+((i*5)%8);
      ctx.beginPath();ctx.arc(tx,ty,4,0,7);ctx.fill();}
    ctx.fillStyle='#6b4a2a';
  } else if(t===4){ // mountain
    ctx.fillStyle='#52525e';ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle='#7a7a8a';ctx.beginPath();ctx.moveTo(sx+3,sy+TILE-3);ctx.lineTo(sx+12,sy+5);ctx.lineTo(sx+21,sy+TILE-3);ctx.fill();
    ctx.fillStyle='#dfe2ee';ctx.beginPath();ctx.moveTo(sx+9,sy+9);ctx.lineTo(sx+12,sy+5);ctx.lineTo(sx+15,sy+9);ctx.fill();
  } else if(t===6||t===11){ ctx.fillStyle=shade(base,0.85);ctx.fillRect(sx+2,sy+2,TILE-4,TILE-4);}
  // structures with emblem
  const emb={7:'🏛',8:'🏘',9:'☗',10:'🏰',23:'🚪',22:'⛩',33:'↑',34:'▣',35:'💎'};
  if(emb[t]){
    if(t===7||t===8||t===9||t===10||t===23||t===22){ // building base
      ctx.fillStyle=shade(base,0.7);ctx.fillRect(sx+2,sy+4,TILE-4,TILE-6);
      ctx.fillStyle=shade(base,1.2);ctx.fillRect(sx+2,sy+4,TILE-4,3);
    }
    ctx.font='15px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emb[t],sx+TILE/2,sy+TILE/2+1);
  }
  ctx.restore();
  // subtle grid
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.strokeRect(sx+.5,sy+.5,TILE,TILE);
}
let wob=0;
function drawPlayer(sx,sy){
  ctx.save();
  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(sx+TILE/2,sy+TILE-3,8,3,0,0,7);ctx.fill();
  // body (hooded explorer)
  ctx.fillStyle='#2a3a6a';ctx.fillRect(sx+7,sy+9,10,12);
  ctx.fillStyle='#e8c89a';ctx.beginPath();ctx.arc(sx+12,sy+8,5,0,7);ctx.fill(); //head
  ctx.fillStyle='#caa24a';ctx.fillRect(sx+7,sy+4,10,3); // gold hood trim
  ctx.restore();
}

function render(){
  wob++;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(B){ renderBattle(); return; }
  if(G&&G.scene==='stadium'){ sdRender(); return; }
  if(G&&G.scene==='fps'){ renderFPS(); return; }
  if(G&&(G.scene==='overworld')) renderGrid(OWMAP,G.px,G.py);
  else if(G&&G.scene==='town') renderInterior(TOWN);
  else if(G&&G.scene==='dungeon') renderInterior(DUN,true);
  else if(G&&G.scene==='museum') renderMuseum();
}
function renderBattle(){
  // arena backdrop

  const g=ctx.createLinearGradient(0,0,0,H);
  if(dun){g.addColorStop(0,'#1a1226');g.addColorStop(1,'#070510');}
  else {g.addColorStop(0,'#243a52');g.addColorStop(.6,'#3a5a3a');g.addColorStop(1,'#2a3a22');}
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // ground band
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(0,H*0.6,W,H*0.4);

  const bw=200,bx=(W-bw)/2,by=32, frac=clamp(B.mhp/B.m.hp,0,1);
  ctx.fillStyle='#2a1414';ctx.fillRect(bx,by,bw,8);
  ctx.fillStyle='#ff5a5a';ctx.fillRect(bx,by,bw*frac,8);
  ctx.strokeStyle='#51202a';ctx.strokeRect(bx+.5,by+.5,bw,8);
  // hero avatar bottom-left

  ctx.fillText((B.log||'').slice(0,70),W/2,H-41);
}
function renderGrid(map,cx,cy){
  const ox=clamp(cx-(VIEW_W>>1),0,map.w-VIEW_W);
  const oy=clamp(cy-(VIEW_H>>1),0,map.h-VIEW_H);
  for(let y=0;y<VIEW_H;y++)for(let x=0;x<VIEW_W;x++){
    const mx=ox+x,my=oy+y; if(mx<0||my<0||mx>=map.w||my>=map.h){continue;}
    drawTile(map.m[my][mx], x*TILE, y*TILE+28, wob);
  }
  // roaming monsters
  if(map===OWMAP){ for(const r of owRoamers){ const sx=(r.x-ox)*TILE,sy=(r.y-oy)*TILE+28;
    if(sx>-TILE&&sx<W&&sy>0&&sy<H) drawRoamerIcon(MONSTERS[r.mi].n,sx,sy); } }
  drawPlayer((cx-ox)*TILE,(cy-oy)*TILE+28);
  // landmark labels near
  if(map===OWMAP){ctx.font='9px sans-serif';ctx.textAlign='center';
    LANDMARKS.forEach(L=>{const sx=(L.x-ox)*TILE+TILE/2,sy=(L.y-oy)*TILE+28-3;
      if(sx>0&&sx<W&&sy>10&&sy<H){ctx.fillStyle='rgba(0,0,0,.6)';
        const w2=ctx.measureText(L.name).width+6;ctx.fillRect(sx-w2/2,sy-9,w2,10);
        ctx.fillStyle='#f4c860';ctx.fillText(L.name,sx,sy-1);}});}
}
function renderInterior(map,dark){
  const ox=clamp(P.x-(VIEW_W>>1),0,Math.max(0,map.w-VIEW_W));
  const oy=clamp(P.y-(VIEW_H>>1),0,Math.max(0,map.h-VIEW_H));
  for(let y=0;y<VIEW_H;y++)for(let x=0;x<VIEW_W;x++){
    const mx=ox+x,my=oy+y; if(mx<0||my<0||mx>=map.w||my>=map.h){continue;}
    const t=map.m[my][mx];
    if(dark){ // fog of war / torch
      const d=Math.hypot(mx-P.x,my-P.y);
      drawTile(t,x*TILE,y*TILE+28,wob);
      if(d>3.2){ctx.fillStyle=`rgba(0,0,0,${clamp((d-3.2)/3,0,.92)})`;ctx.fillRect(x*TILE,y*TILE+28,TILE,TILE);}
    } else drawTile(t,x*TILE,y*TILE+28,wob);
  }
  if(map.doors) map.doors.forEach(d=>{}); // doors drawn as tiles already
  if(map.npcs) map.npcs.forEach(n=>{const sx=(n.x-ox)*TILE,sy=(n.y-oy)*TILE+28;
    ctx.fillStyle='#7ee08a';ctx.beginPath();ctx.arc(sx+12,sy+12,6,0,7);ctx.fill();
    ctx.fillStyle='#0b0f1c';ctx.font='10px serif';ctx.textAlign='center';ctx.fillText('?',sx+12,sy+15);});
  // dungeon roamers (only within torchlight)
  if(dark&&map===DUN){ for(const r of dunRoamers){ const d=Math.hypot(r.x-P.x,r.y-P.y);
    if(d<=3.4){ const sx=(r.x-ox)*TILE,sy=(r.y-oy)*TILE+28; drawRoamerIcon(MONSTERS[r.mi].n,sx,sy); } } }
  drawPlayer((P.x-ox)*TILE,(P.y-oy)*TILE+28);
}

/* ===================== First-person dungeon (raycaster) ===================== */
function fpsWall(t){ return t===undefined||t===31||t===36; }
function cellAhead(){
  const dv=[[0,-1],[1,0],[0,1],[-1,0]][G.dir];
  const x=P.x+dv[0],y=P.y+dv[1]; const t=(DUN.m[y]||[])[x];
  if(t===33)return '↑ Stairs — step forward to climb out';
  if(t===34)return '▣ Chest ahead — step forward';
  if(t===35)return '💎 The Sapphire — step forward!';
  if(t===36)return '≈ Water blocks the way';
  if(fpsWall(t))return 'Wall ahead';
  return '';
}
function renderFPS(){
  const pir=DUN.theme==='pirate';
  // ceiling & floor
  ctx.fillStyle=pir?'#0a1420':'#0a0812'; ctx.fillRect(0,0,W,H/2);
  ctx.fillStyle=pir?'#10202c':'#161019'; ctx.fillRect(0,H/2,W,H/2);
  const posX=P.x+0.5, posY=P.y+0.5;
  const dv=[[0,-1],[1,0],[0,1],[-1,0]][G.dir];
  const dirX=dv[0], dirY=dv[1];
  const planeX=-dirY*0.66, planeY=dirX*0.66;
  const cols=Math.floor(W/2), colw=W/cols;
  const zbuf=new Array(cols);
  for(let c=0;c<cols;c++){
    const camX=2*c/cols-1;
    let rdx=dirX+planeX*camX||1e-6, rdy=dirY+planeY*camX||1e-6;
    let mapX=Math.floor(posX), mapY=Math.floor(posY);
    const ddx=Math.abs(1/rdx), ddy=Math.abs(1/rdy);
    let stepX,stepY,sdx,sdy;
    if(rdx<0){stepX=-1;sdx=(posX-mapX)*ddx;}else{stepX=1;sdx=(mapX+1-posX)*ddx;}
    if(rdy<0){stepY=-1;sdy=(posY-mapY)*ddy;}else{stepY=1;sdy=(mapY+1-posY)*ddy;}
    let hit=0,side=0,tile=31,g=0;
    while(!hit && g++<48){
      if(sdx<sdy){sdx+=ddx;mapX+=stepX;side=0;}else{sdy+=ddy;mapY+=stepY;side=1;}
      const row=DUN.m[mapY]; tile=row?row[mapX]:31;
      if(fpsWall(tile)) hit=1;
    }
    let dist=(side===0?sdx-ddx:sdy-ddy); if(dist<0.0001)dist=0.0001; zbuf[c]=dist;
    const lh=Math.min(H*3, H/dist);
    const y0=Math.floor(H/2-lh/2), y1=Math.floor(H/2+lh/2);
    const baseCol = tile===36?[40,95,165] : (pir?[125,95,68]:[96,86,112]);
    const sh=(side===1?0.68:1)*Math.max(0.22,1-dist/13);
    ctx.fillStyle=`rgb(${baseCol[0]*sh|0},${baseCol[1]*sh|0},${baseCol[2]*sh|0})`;
    ctx.fillRect(Math.floor(c*colw),y0,Math.ceil(colw)+1,y1-y0);
  }
  // sprites: special tiles + roaming monsters
  const sprites=[];
  for(let y=Math.max(0,P.y-9);y<Math.min(DUN.h,P.y+10);y++)for(let x=Math.max(0,P.x-9);x<Math.min(DUN.w,P.x+10);x++){
    const t=DUN.m[y][x]; if(t===33||t===34||t===35) sprites.push({x:x+0.5,y:y+0.5,t});
  }
  for(const r of dunRoamers) sprites.push({x:r.x+0.5,y:r.y+0.5,mon:MONSTERS[r.mi].n});
  sprites.forEach(s=>s.d=(s.x-posX)**2+(s.y-posY)**2); sprites.sort((a,b)=>b.d-a.d);
  const invDet=1/(planeX*dirY-dirX*planeY);
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const s of sprites){
    const rx=s.x-posX, ry=s.y-posY;
    const tx=invDet*(dirY*rx-dirX*ry);
    const ty=invDet*(-planeY*rx+planeX*ry);
    if(ty<=0.25) continue;
    const screenX=(W/2)*(1+tx/ty);
    const size=Math.min(H*0.9, (H/ty)*0.5);
    const col=Math.floor(screenX/colw);
    if(col<0||col>=cols) continue;
    if(ty>zbuf[col]+0.2) continue; // behind a wall
    const yc=H/2+(H/ty)*0.16;
    if(s.mon){ drawCreature(s.mon, screenX, yc, Math.max(8,size*0.4), wob); }
    else { ctx.font=Math.max(14,size*0.7)+'px serif'; ctx.fillText(s.t===33?'⬆️':s.t===34?'🧰':'💎', screenX, yc); }
  }
  ctx.textBaseline='alphabetic';
  // top HUD strip
  ctx.fillStyle='rgba(7,9,18,.82)';ctx.fillRect(0,0,W,22);
  ctx.fillStyle='#caa24a';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText(['N','E','S','W'][G.dir]+' · '+(pir?"Pirate's Lair":"Catacombs of Armak"),8,15);
  const ah=cellAhead(); if(ah){ ctx.fillStyle='#5cc6ff';ctx.textAlign='right';ctx.fillText(ah,W-8,15); }
}

function museumCols(){ return Math.max(3, Math.min(5, Math.floor((W-16)/84))); }
function museumPads(){
  const pads=[]; const cols=museumCols(); const padW=Math.floor((W-16)/cols), padH=64, x0=8, y0=44;

/* ===================== Player cursor for interiors ===================== */
let P={x:0,y:0,mi:0};
let TOWN=null, DUN=null, currentTownId=null;

/* ===================== UI: dialogue queue ===================== */
let dq=[], dqCb=null, dlgOpen=false, typed='', typeTarget='', typeI=0, typeTimer=0;
function say(lines, who, cb){
  dq=(Array.isArray(lines)?lines:[lines]).slice();
  dqCb=cb||null; dlgOpen=true; $('dlg').style.display='block';
  $('dwho').textContent=who||''; nextLine();
}
function nextLine(){
  if(dq.length===0){ $('dlg').style.display='none'; dlgOpen=false; const cb=dqCb;dqCb=null; if(cb)cb(); return;}
  typeTarget=dq.shift(); typed='';typeI=0; $('dtxt').textContent='';
}
function tickType(dt){
  if(!dlgOpen) return;
  if(typeI<typeTarget.length){ typeTimer+=dt; while(typeTimer>12&&typeI<typeTarget.length){typed+=typeTarget[typeI++];typeTimer-=12;}
    $('dtxt').textContent=typed; }
}
function advanceDlg(){
  if(typeI<typeTarget.length){ typed=typeTarget;typeI=typeTarget.length;$('dtxt').textContent=typed; return; }
  nextLine();
}
